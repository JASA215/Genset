<script>
/* ── Boot self-check: turns a silent "stuck on Loading" into a visible error ── */
(function(){
  var APP_VERSION="v20260530140000";
  var lastErr="";
  function esc(s){return String(s).replace(/[<>&]/g,function(c){return{"<":"&lt;",">":"&gt;","&":"&amp;"}[c];});}
  function showBootError(detail){
    if(window.__BOOTED) return;            /* app is running — never clobber it */
    var root=document.getElementById("root");
    if(!root) return;
    root.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:Segoe UI,Tahoma,Arial,sans-serif">'
      +'<div style="max-width:520px;width:100%;background:#121823;border:1px solid #2A3A4D;border-radius:14px;padding:24px;color:#E8EFF7">'
      +'<div style="font-size:30px;margin-bottom:10px">&#9888;&#65039;</div>'
      +'<div style="font-size:18px;font-weight:800;color:#F5A623;margin-bottom:8px">GenSet failed to load</div>'
      +'<div style="font-size:13px;color:#7D8F9E;line-height:1.5;margin-bottom:14px">The app did not start. This is usually a code error in the latest update, or a library failed to load. Details below.</div>'
      +'<pre style="white-space:pre-wrap;word-break:break-word;background:#0A0E14;border:1px solid #2A3A4D;border-radius:8px;padding:12px;font-size:11px;color:#FF8A8A;max-height:170px;overflow:auto;margin:0 0 14px">'+(detail||"Unknown error")+'</pre>'
      +'<button onclick="location.reload(true)" style="background:linear-gradient(135deg,#F5A623,#C47B0A);color:#0D0800;border:none;border-radius:10px;padding:12px 18px;font-size:14px;font-weight:800;cursor:pointer">&#8635; Reload</button>'
      +'<div style="font-size:10px;color:#4A5A6D;margin-top:12px">'+APP_VERSION+'</div>'
      +'</div></div>';
  }
  window.addEventListener("error",function(e){
    var m=(e.message||"Script error");
    if(e.filename){m+="\n"+e.filename+(e.lineno?(":"+e.lineno+(e.colno?":"+e.colno:"")):"");}
    lastErr=m; showBootError(esc(m));
  });
  window.addEventListener("unhandledrejection",function(e){
    lastErr=(e.reason&&(e.reason.stack||e.reason.message))||String(e.reason);
    showBootError(esc(lastErr));
  });
  window.addEventListener("load",function(){
    setTimeout(function(){
      if(!window.__BOOTED){
        showBootError(lastErr?esc(lastErr):"The app did not finish starting within 10 seconds. A library (React, Babel, or Firebase) may have failed to load, or your connection dropped.");
      }
    },10000);
  });
})();
</script>
