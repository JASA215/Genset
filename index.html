      <div style={{marginBottom:10}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 2fr auto",gap:6,marginBottom:6}}>
          <div style={{color:C.accent,fontSize:11,fontWeight:700}}>{t("Part No.","رقم القطعة")}</div>
          <div style={{color:C.accent,fontSize:11,fontWeight:700}}>{t("Description","الوصف")}</div>
          <div style={{color:C.accent,fontSize:11,fontWeight:700}}>{t("Qty","الكمية")}</div>
        </div>
        {survey.warrantyParts.map((p,i)=>(
          <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 2fr auto",gap:6,marginBottom:8,alignItems:"center"}}>
            <input value={p.partNo} onChange={e=>{const pts=[...survey.warrantyParts];pts[i]={...pts[i],partNo:e.target.value};sf("warrantyParts",pts);}}
              placeholder="e.g. T400268" style={{background:C.bg,border:"1px solid "+C.border,borderRadius:7,color:C.text,padding:"8px 10px",fontSize:12,outline:"none"}}/>
            <input value={p.description} onChange={e=>{const pts=[...survey.warrantyParts];pts[i]={...pts[i],description:e.target.value};sf("warrantyParts",pts);}}
              placeholder={t("Description...","الوصف...")} style={{background:C.bg,border:"1px solid "+C.border,borderRadius:7,color:C.text,padding:"8px 10px",fontSize:12,outline:"none"}}/>
            <input value={p.qty} onChange={e=>{const pts=[...survey.warrantyParts];pts[i]={...pts[i],qty:e.target.value};sf("warrantyParts",pts);}}
              placeholder="1" type="number" style={{background:C.bg,border:"1px solid "+C.border,borderRadius:7,color:C.text,padding:"8px 10px",fontSize:12,outline:"none",width:50}}/>
          </div>
        ))}
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button onClick={()=>sf("warrantyParts",[...survey.warrantyParts,{partNo:"",description:"",qty:""}])}
            style={{flex:1,background:"rgba(245,166,35,0.15)",border:"1px solid rgba(245,166,35,0.3)",color:C.accent,borderRadius:9,padding:"9px",fontWeight:700,cursor:"pointer",fontSize:12}}>
            ➕ {t("Add Part","إضافة قطعة")}
          </button>
          {survey.warrantyParts.length>1&&<button onClick={()=>sf("warrantyParts",survey.warrantyParts.slice(0,-1))}
            style={{flex:1,background:"rgba(207,32,38,0.1)",border:"1px solid rgba(207,32,38,0.3)",color:C.red,borderRadius:9,padding:"9px",fontWeight:700,cursor:"pointer",fontSize:12}}>
            ➖ {t("Remove Last","حذف الأخير")}
          </button>}
        </div>
      </div>
    </Card>}

    {/* ══ CUSTOMER COMPLAINT STEPS ══ */}

    {survey.serviceType==="Customer Complaint"&&step===1&&<Card title={t("Complaint Details","تفاصيل الشكوى")} titleAr={lang==="en"?"تفاصيل الشكوى":"Complaint Details"} icon="📝">
      <div style={{marginBottom:14}}>
        <div style={{color:C.muted,fontSize:11,marginBottom:8,fontWeight:600,textTransform:"uppercase"}}>"SEVERITY / مستوى الخطورة"</div>
        {[["low","🟢 Low","منخفض"],["medium","🟡 Medium","متوسط"],["high","🟠 High","عالي"],["critical","🔴 Critical","حرج"]].map(([v,en,ar])=>(
          <button key={v} onClick={()=>sf("complaintSeverity",v)} style={{display:"inline-block",background:survey.complaintSeverity===v?"linear-gradient(135deg,#F5A623,#C47B0A)":C.surface,color:survey.complaintSeverity===v?"#0D0800":C.text,border:"1px solid "+(survey.complaintSeverity===v?"#F5A623":C.border),borderRadius:10,padding:"9px 14px",fontSize:13,fontWeight:700,cursor:"pointer",marginRight:8,marginBottom:8}}>{en} <span style={{opacity:0.7,fontSize:11}}>/ {ar}</span></button>
        ))}
      </div>
      <div style={{marginBottom:14}}>
        <div style={{color:C.muted,fontSize:11,marginBottom:5,fontWeight:600,textTransform:"uppercase"}}>"COMPLAINT / وصف الشكوى"</div>
        <Txa value={survey.complaintDescription} onChange={v=>sf("complaintDescription",v)} placeholder="Describe the complaint in detail... / صف الشكوى بالتفصيل..."/>
      </div>
      <div style={{marginBottom:14}}>
        <div style={{color:C.muted,fontSize:11,marginBottom:5,fontWeight:600,textTransform:"uppercase"}}>"ACTION TAKEN / الإجراء المتخذ"</div>
        <Txa value={survey.issues} onChange={v=>sf("issues",v)} placeholder="Action taken... / الإجراء المتخذ..."/>
      </div>
      <div style={{marginBottom:14}}>
        <div style={{color:C.muted,fontSize:11,marginBottom:5,fontWeight:600,textTransform:"uppercase"}}>{"CUSTOMER COMMENTS / تعليقات العميل"}</div>
        <Txa value={survey.customerComments} onChange={v=>sf("customerComments",v)} placeholder={t("Customer feedback...","تعليقات العميل...")}/>
      </div>
    </Card>}

    {/* ══ SHARED REVIEW STEP (last step for all types) ══ */}

    {/* ══ PM REVIEW / SHARED REVIEW ══ */}
    {(survey.serviceType==="Preventive Maintenance"||!survey.serviceType)&&step===6&&<div>
      <Card title={t("Score Summary","ملخص التقييم")} titleAr={lang==="en"?"ملخص التقييم":"Score Summary"} icon="📊">
        <div style={{display:"flex",justifyContent:"space-around",flexWrap:"wrap",gap:12,marginBottom:14}}>
          <Ring score={ov} label="Overall" labelAr="الإجمالي" sz={76}/>
          <Ring score={ph} label="Physical" labelAr="خارجي" sz={76}/>
          <Ring score={en_} label="Engine" labelAr="محرك" sz={76}/>
          <Ring score={te} label="Tech" labelAr="الفني" sz={76}/>
          <Ring score={csat} label="CSAT" labelAr="العميل" sz={76}/>
        </div>
        <div style={{color:C.muted,fontSize:13}}>{t("Checklist:","القائمة:")} <strong style={{color:C.text}}>{dc(survey.parts)}</strong> {t("completed","منجز")}</div>
      </Card>
      <Card title={t("Issues & Follow-Up","المشكلات والمتابعة")} titleAr={lang==="en"?"المشكلات والمتابعة":"Issues & Follow-Up"} icon="⚠️" accent={C.accent}>
        <div style={{color:C.muted,fontSize:11,marginBottom:5,fontWeight:600,textTransform:"uppercase"}}>"ISSUES OBSERVED / المشكلات الملاحظة"</div>
        <Txa value={survey.issues} onChange={v=>sf("issues",v)} placeholder="Issues found... / المشكلات الملاحظة..."/>
        <div style={{marginTop:10}}><Tog checked={survey.followUpRequired} onChange={v=>sf("followUpRequired",v)} en={t("Follow-up visit required","مطلوب زيارة متابعة")} ar={lang==="en"?"مطلوب زيارة متابعة":"Follow-up visit required"}/></div>
        {survey.followUpRequired&&<div>
          <div style={{color:C.muted,fontSize:11,marginBottom:5,fontWeight:600,textTransform:"uppercase"}}>{t("Follow-up Date","تاريخ المتابعة")} / تاريخ المتابعة</div>
          <Inp type="date" value={survey.followUpDate} onChange={v=>sf("followUpDate",v)}/>
          <div style={{marginTop:10}}>
            <div style={{color:C.muted,fontSize:11,marginBottom:5,fontWeight:600,textTransform:"uppercase"}}>{t("Action Required","الإجراء المطلوب")} / الإجراء المطلوب</div>
            <Txa value={survey.followUpNotes} onChange={v=>sf("followUpNotes",v)} placeholder={t("What needs to be done...","ما الذي يجب القيام به...")}/>
          </div>
        </div>}
      </Card>
      <button onClick={submitSurvey} style={{width:"100%",background:"linear-gradient(135deg,#F5A623,#C47B0A)",color:"#0D0800",border:"none",borderRadius:13,padding:"20px",fontSize:17,fontWeight:900,cursor:"pointer",boxShadow:"0 4px 20px rgba(245,166,35,0.4)",marginTop:8}}>
        {syncing?t("Saving... 🔄","جاري الحفظ... 🔄"):("✅ "+t("Submit Inspection Survey","إرسال نتائج الفحص"))}
      </button>
    </div>}

    {/* Shared Review for non-PM types */}
    {survey.serviceType!=="Preventive Maintenance"&&survey.serviceType&&step===STEPS.length-1&&<div>
      <Card title={t("Summary","الملخص")} icon="📋">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[[t("Service Type","نوع الخدمة"),survey.serviceType],[t("Customer","العميل"),survey.customerName],[t("Branch","الفرع"),survey.branch],[t("Technician","الفني"),survey.technicianName],[t("Date","التاريخ"),survey.date],[t("Engine Model","موديل المحرك"),survey.engineModel],[t("Serial No.","الرقم التسلسلي"),survey.serialNumber],[t("Capacity","السعة"),survey.genCapacity],[t("Brand","الماركة"),survey.engineBrand]].filter(([,v])=>v).map(([l,v])=>(
            <div key={l} style={{background:C.surface,borderRadius:8,padding:"8px 10px"}}>
              <div style={{color:C.muted,fontSize:10,fontWeight:600}}>{l}</div>
              <div style={{color:C.text,fontSize:12,fontWeight:600,marginTop:2}}>{v}</div>
            </div>
          ))}
        </div>
      </Card>
      <Card title={t("Issues & Follow-Up","المشكلات والمتابعة")} icon="⚠️" accent={C.accent}>
        <div style={{color:C.muted,fontSize:11,marginBottom:5,fontWeight:600,textTransform:"uppercase"}}>{t("Issues / Notes","ملاحظات / مشكلات")}</div>
        <Txa value={survey.issues} onChange={v=>sf("issues",v)} placeholder={t("Any issues observed...","أي ملاحظات...")}/>
        <div style={{marginTop:10}}><Tog checked={survey.followUpRequired} onChange={v=>sf("followUpRequired",v)} en={t("Follow-up visit required","مطلوب زيارة متابعة")} ar={t("مطلوب زيارة متابعة","Follow-up visit required")}/></div>
        {survey.followUpRequired&&<div style={{marginTop:10}}>
          <div style={{color:C.muted,fontSize:11,marginBottom:5,fontWeight:600,textTransform:"uppercase"}}>{t("Follow-up Date","تاريخ المتابعة")}</div>
          <Inp type="date" value={survey.followUpDate} onChange={v=>sf("followUpDate",v)}/>
          <div style={{marginTop:10}}>
            <div style={{color:C.muted,fontSize:11,marginBottom:5,fontWeight:600,textTransform:"uppercase"}}>{t("Action Required","الإجراء المطلوب")}</div>
            <Txa value={survey.followUpNotes} onChange={v=>sf("followUpNotes",v)} placeholder={t("What needs to be done...","ما الذي يجب القيام به...")}/>
          </div>
        </div>}
      </Card>
      <button onClick={submitSurvey} style={{width:"100%",background:"linear-gradient(135deg,#F5A623,#C47B0A)",color:"#0D0800",border:"none",borderRadius:13,padding:"20px",fontSize:17,fontWeight:900,cursor:"pointer",boxShadow:"0 4px 20px rgba(245,166,35,0.4)",marginTop:8}}>
        {syncing?t("Saving... 🔄","جاري الحفظ... 🔄"):("✅ "+t("Submit Survey","إرسال النتائج"))}
      </button>
    </div>}

    {(survey.serviceType==="Preventive Maintenance"||!survey.serviceType)&&(
      (step===1&&(survey._physPage||0)===0)||(step===3&&(survey._partPage||0)===0)||(step===4&&(survey._tecPage||0)===0)
    )?<div style={{textAlign:"center",color:C.muted,fontSize:12,marginTop:12,padding:"8px",background:"rgba(230,146,10,0.08)",borderRadius:8,border:"1px solid rgba(230,146,10,0.2)"}}>
      👆 {t("Complete this page then tap Next →","أكمل هذه الصفحة ثم اضغط التالي →")}
    </div>:<div style={{display:"flex",gap:10,marginTop:16}}>
      {step>0&&<SBtn flex onClick={()=>setStep(step-1)}>&#8592; {t("Back","رجوع")}</SBtn>}
      {step<STEPS.length-1&&<button onClick={()=>setStep(step+1)} style={{flex:1,background:"linear-gradient(135deg,#F5A623,#C47B0A)",color:"#0D0800",border:"none",borderRadius:11,padding:"14px",fontSize:15,fontWeight:900,cursor:"pointer"}}>{t("Continue","متابعة")} &#8594;</button>}
    </div>}
  </div></Bg>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
