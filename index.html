/* ── Helpers ──────────────────────────────────────────── */
function makeT(lang){return(en,ar)=>lang==="ar"?ar:en;}
function avg(o){const v=Object.values(o).filter(x=>typeof x==="number"&&x>0);return v.length?v.reduce((a,b)=>a+b)/v.length:0;}
function dc(p){const v=Object.values(p);return v.filter(Boolean).length+"/"+v.length;}
function ovs(s){return((s.scores.physical+s.scores.engine+s.scores.tech+s.scores.csat)/4).toFixed(2);}
function sc(v){return v>=4?C.green:v>=3?C.yellow:v>0?C.red:C.muted;}
function fmtD(d){if(!d)return"-";const[y,m,dy]=d.split("-");return dy+"/"+m+"/"+y;}
function nowM(){return new Date().toISOString().slice(0,7);}
function mStr(d){return d?d.slice(0,7):"";}
function ld(k,def=[]){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;}}
function sv(k,d){try{localStorage.setItem(k,JSON.stringify(d));}catch{}}

function parseCust(rows){
  if(!rows||rows.length<2)return[];
  const hdrs=(rows[0]||[]).map(h=>String(h||"").toLowerCase().trim());
  const get=(row,...names)=>{for(const n of names){const i=hdrs.findIndex(h=>h.includes(n));if(i>=0&&row[i]!=null)return String(row[i]).trim();}return"";};
  return rows.slice(1).filter(r=>r&&r.some(c=>c)).map((r,i)=>({
    customerName:get(r,"customer","client","name","company","account"),
    siteLocation:get(r,"site","location","address","city","area"),
    generatorModel:get(r,"model","generator","genset","unit"),
    serialNumber:get(r,"serial","s/n","sn"),
    contactPerson:get(r,"contact","person","rep"),
    phone:get(r,"phone","mobile","tel"),
    serviceType:get(r,"service","type"),
  })).filter(c=>c.customerName);
}

/* ══ CUSTOMER DB ═════════════════════════════════════ */
function CustomerDB({customers,onBack,lang,onImport,onDelete}){
  const t=makeT(lang);
  const fileRef=useRef();
  const [search,setSearch]=useState("");
  const [adding,setAdding]=useState(false);
  const [form,setForm]=useState({customerName:"",siteLocation:"",generatorModel:"",serialNumber:"",contactPerson:"",phone:""});
  const [saving2,setSaving2]=useState(false);
  async function importFile(e){
    const file=e.target.files[0];if(!file)return;
    const rdr=new FileReader();
    rdr.onload=async ev=>{
      const data=new Uint8Array(ev.target.result);const wb=XLSX.read(data,{type:"array"});const ws=wb.Sheets[wb.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      const parsed=parseCust(rows);
      await onImport(parsed);
      alert(t("✅ Imported ","✅ تم استيراد ")+parsed.length+t(" customer(s)!"," عميل!"));
    };
    rdr.readAsArrayBuffer(file);e.target.value="";
  }
  async function addManual(){
    if(!form.customerName.trim())return alert(t("Customer name is required.","اسم العميل مطلوب."));
    setSaving2(true);await onImport([form]);
    setForm({customerName:"",siteLocation:"",generatorModel:"",serialNumber:"",contactPerson:"",phone:""});
    setAdding(false);setSaving2(false);
  }
  const filtered=customers.filter(c=>!search||c.customerName.toLowerCase().includes(search.toLowerCase())||(c.siteLocation||"").toLowerCase().includes(search.toLowerCase()));
  return<Bg dir={lang==="ar"?"rtl":"ltr"}>
    <div style={{maxWidth:480,margin:"0 auto",padding:"0 16px 40px"}}>

        <LangBtn lang={lang} setLang={l=>{sv("genset_lang",l);window.location.reload();}}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        <PBtn onClick={()=>fileRef.current.click()}>📥 {t("Import Excel/CSV","استيراد Excel/CSV")}</PBtn>
        <SBtn full onClick={()=>setAdding(!adding)}>➕ {t("Add Manually","إضافة يدوية")}</SBtn>
        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" onChange={importFile} style={{display:"none"}}/>
      </div>
      {adding&&<Card title={t("Add New Customer","إضافة عميل جديد")} icon="➕" lang={lang}>
        {[["customerName",t("Customer Name *","اسم العميل *"),t("Company / Person","شركة / شخص")],["siteLocation",t("Site Location","الموقع"),t("City / Address","المدينة / العنوان")],["generatorModel",t("Generator Model","موديل المولد"),"e.g. Cummins C275D5"],["serialNumber","Serial Number / الرقم التسلسلي","S/N"],["contactPerson",t("Contact Person","الشخص المسؤول"),""],["phone",t("Phone","الهاتف"),""]].map(([k,l,p])=>(
          <div key={k} style={{marginBottom:12}}>
            <div style={{color:C.muted,fontSize:11,marginBottom:4,fontWeight:600,textTransform:"uppercase"}}>{l}</div>
            <Inp value={form[k]} onChange={v=>setForm(f=>({...f,[k]:v}))} placeholder={p} lang={lang}/>
          </div>
        ))}
        <div style={{display:"flex",gap:10}}>
          <SBtn flex onClick={()=>setAdding(false)}>{t("Cancel","إلغاء")}</SBtn>
          <button onClick={addManual} disabled={saving2} style={{flex:1,background:"linear-gradient(135deg,#F5A623,#C47B0A)",color:"#0D0800",border:"none",borderRadius:10,padding:"14px",fontWeight:800,cursor:"pointer"}}>{saving2?t("Saving...","جاري الحفظ..."):t("Save","حفظ")}</button>

      <div style={{position:"relative",marginBottom:14}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={t("Search customers...","البحث عن عميل...")} style={{width:"100%",background:"rgba(10,16,24,0.85)",border:"1px solid "+C.border,borderRadius:10,color:C.text,padding:"11px 14px 11px 38px",fontSize:14,outline:"none",boxSizing:"border-box"}}/>

        :filtered.map(c=><div key={c.id} style={{background:C.card,border:"1px solid "+C.border,borderRadius:12,padding:"14px 16px",marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>

  </Bg>;
}

/* ══ MAIN APP ════════════════════════════════════════ */
function App(){
  const [lang,setLang]=useState(()=>ld("genset_lang","en")||"en");
  const t=makeT(lang);
  const dir=lang==="ar"?"rtl":"ltr";

  const [view,setView]=useState("menu");
  const [survey,setSurvey]=useState(blank);
  const [subs,setSubs]=useState([]);
  const [custs,setCusts]=useState([]);
  const [step,setStep]=useState(0);
  const [done,setDone]=useState(false);
  const [sel,setSel]=useState(null);
  const [loading,setLoading]=useState(true);
  const [syncing,setSyncing]=useState(false);
  const [online,setOnline]=useState(navigator.onLine);
  const [cs,setCs]=useState("");
  const [showDrop,setShowDrop]=useState(false);

  const STEPS=lang==="ar"?STEPS_AR:STEPS_EN;

  // Network status
  useEffect(()=>{
    const up=()=>setOnline(true);const down=()=>setOnline(false);
    window.addEventListener("online",up);window.addEventListener("offline",down);
    return()=>{window.removeEventListener("online",up);window.removeEventListener("offline",down);};
  },[]);

  // Firebase real-time listeners
  useEffect(()=>{
    if(!CONFIG_READY||!db){setLoading(false);return;}
    const timeout=setTimeout(()=>setLoading(false),8000);
    const unsubSurveys=db.collection("surveys").orderBy("submittedAt","desc").onSnapshot(snap=>{
      setSubs(snap.docs.map(d=>({...d.data(),id:d.id})));
      clearTimeout(timeout);setLoading(false);
    },err=>{console.error(err);clearTimeout(timeout);setLoading(false);});
    const unsubCusts=db.collection("customers").onSnapshot(snap=>{
      setCusts(snap.docs.map(d=>({...d.data(),id:d.id})));
    },err=>console.error(err));
    return()=>{unsubSurveys();unsubCusts();clearTimeout(timeout);};
  },[]);

  function sf(path,val){setSurvey(p=>{if(path.includes(".")){const[s,k]=path.split(".");return{...p,[s]:{...p[s],[k]:val}};}return{...p,[path]:val};});}

  async function submitSurvey(){
    const ph=avg(survey.physical),en=avg(survey.engine),te=avg(survey.tech),csat=avg(survey.csat);
    const entry={...survey,submittedAt:new Date().toISOString(),scores:{physical:ph,engine:en,tech:te,csat}};
    setSyncing(true);
    try{await db.collection("surveys").add(entry);}catch(e){alert(t("Error saving. Check connection.","خطأ في الحفظ. تحقق من الاتصال."));}
    setSyncing(false);setDone(true);
  }

  async function markDone(id){
    try{await db.collection("surveys").doc(id).update({followUpDone:true});}catch(e){alert(t("Sync error.","خطأ في المزامنة."));}
  }

  async function delSub(id){
    if(!window.confirm(t("Delete this survey?","حذف هذا الفحص؟")))return;
    try{await db.collection("surveys").doc(id).delete();}catch(e){}
  }

  async function importCustomers(list){
    setSyncing(true);
    const existing=custs.map(c=>c.customerName+c.serialNumber);
    const newOnes=list.filter(c=>!existing.includes(c.customerName+c.serialNumber));
    try{for(const c of newOnes){await db.collection("customers").add(c);}}catch(e){}
    setSyncing(false);
  }

  async function deleteCustomer(id){
    try{await db.collection("customers").doc(id).delete();}catch(e){}
  }

  function fillCust(c){setSurvey(p=>({...p,customerName:c.customerName||p.customerName,siteLocation:c.siteLocation||p.siteLocation,generatorModel:c.generatorModel||p.generatorModel,serialNumber:c.serialNumber||p.serialNumber,serviceType:c.serviceType||p.serviceType}));setCs(c.customerName);setShowDrop(false);}
  function reset(){setSurvey(blank());setStep(0);setDone(false);setCs("");setShowDrop(false);setView("menu");}

  const ph=avg(survey.physical),en_=avg(survey.engine),te=avg(survey.tech),csat=avg(survey.csat);
  const ov=(ph+en_+te+csat)/4;
  const pendFU=subs.filter(s=>s.followUpRequired&&!s.followUpDone);
  const dropCusts=custs.filter(c=>!cs||c.customerName.toLowerCase().includes(cs.toLowerCase())).slice(0,6);

  // Show setup screen if Firebase not configured
  if(!CONFIG_READY)return<SetupScreen lang={lang}/>;

  if(loading)return<Bg><div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",flexDirection:"column",gap:16}}><div style={{fontSize:44,animation:"pulse 1s infinite"}}>⚡</div><div style={{color:C.muted,fontSize:14}}>{t("Connecting to cloud...","الاتصال بالسحابة...")}</div></div></Bg>;

  if(view==="manager")return<ManagerReport subs={subs} onBack={()=>setView("menu")} lang={lang}/>;
  if(view==="customers")return<CustomerDB customers={custs} onBack={()=>setView("menu")} lang={lang} onImport={importCustomers} onDelete={deleteCustomer}/>;

  /* ── MENU ── */
  if(view==="menu"){
    const n=subs.length,aov=n?(subs.reduce((a,s)=>a+parseFloat(ovs(s)),0)/n).toFixed(1):"-";
    return<Bg dir={dir}>
      <div style={{maxWidth:480,margin:"0 auto",padding:"0 16px 40px"}}>
        <div style={{display:"flex",justifyContent:"flex-end",padding:"12px 0 0"}}><LangBtn lang={lang} setLang={l=>{setLang(l);sv("genset_lang",l);}}/></div>
        <div style={{padding:"18px 0 18px",textAlign:"center"}}>
          <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:76,height:76,borderRadius:"50%",background:"linear-gradient(135deg,#F5A623,#C47B0A)",boxShadow:"0 0 36px rgba(245,166,35,0.5)",fontSize:36,marginBottom:12}}>⚡</div>
          <h1 style={{margin:0,fontSize:24,fontWeight:900,letterSpacing:-0.5}}>{t("GenSet Aftersales","جينسيت للخدمة")}</h1>
          <p style={{margin:"5px 0 8px",color:C.muted,fontSize:12}}>{t("Diesel Generator Inspection","فحص المولدات الديزل")}</p>
        </div>
        <SyncBanner online={online} syncing={syncing} t={t}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
          {[[t("Surveys","الفحوصات"),n],[t("Avg Score","متوسط التقييم"),aov],[t("Follow-Ups","المتابعات"),pendFU.length]].map(([l,v])=>(
            <div key={l} style={{background:C.card,border:"1px solid "+(l===t("Follow-Ups","المتابعات")&&pendFU.length>0?C.accent:C.border),borderRadius:13,padding:"14px 8px",textAlign:"center",cursor:l===t("Follow-Ups","المتابعات")?"pointer":"default"}} onClick={()=>l===t("Follow-Ups","المتابعات")&&setView("followups")}>
              <div style={{fontSize:22,fontWeight:900,color:C.accent}}>{v}</div>
              <div style={{fontSize:10,color:C.muted,marginTop:3}}>{l}</div>
            </div>
          ))}
        </div>
        {pendFU.length>0&&<div onClick={()=>setView("followups")} style={{background:"rgba(245,166,35,0.1)",border:"1px solid "+C.accent,borderRadius:12,padding:"12px 16px",marginBottom:12,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontWeight:800,color:C.accent,fontSize:14}}>🔔 {pendFU.length} {t("Follow-Ups Pending","متابعات معلقة")}</div><div style={{color:C.muted,fontSize:12}}>{t("Tap to review","اضغط للمراجعة")}</div></div>
          <span style={{color:C.accent,fontSize:22}}>›</span>
        </div>}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <PBtn full onClick={()=>{setSurvey(blank());setStep(0);setDone(false);setCs("");setView("survey");}}>+ {t("New Inspection Survey","فحص جديد")}</PBtn>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <SBtn full onClick={()=>setView("dashboard")}>📊 {t("Dashboard","لوحة التحكم")}</SBtn>
            <SBtn full onClick={()=>setView("history")}>🗂 {t("History","السجل")} ({n})</SBtn>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <SBtn full onClick={()=>setView("followups")}>🔔 {t("Follow-Ups","المتابعات")} {pendFU.length>0?"("+pendFU.length+")":""}</SBtn>
            <SBtn full onClick={()=>setView("manager")}>📄 {t("Manager Report","تقرير المدير")}</SBtn>
          </div>
          <SBtn full onClick={()=>setView("customers")}>👥 {t("Customer Database","قاعدة بيانات العملاء")} ({custs.length})</SBtn>
        </div>
        <div style={{marginTop:16,textAlign:"center",fontSize:10,color:"rgba(125,143,158,0.35)",letterSpacing:1}}>🔥 Firebase Cloud Sync · 4-Cylinder Diesel Suite</div>
      </div>
    </Bg>;
  }

  /* ── DASHBOARD ── */
  if(view==="dashboard"){
    const techMap={};subs.forEach(s=>{if(!s.technicianName)return;if(!techMap[s.technicianName])techMap[s.technicianName]=[];techMap[s.technicianName].push(s);});
    const n=subs.length,ca=n?{physical:subs.reduce((a,s)=>a+s.scores.physical,0)/n,engine:subs.reduce((a,s)=>a+s.scores.engine,0)/n,tech:subs.reduce((a,s)=>a+s.scores.tech,0)/n,csat:subs.reduce((a,s)=>a+s.scores.csat,0)/n}:{physical:0,engine:0,tech:0,csat:0};
    const aov=n?subs.reduce((a,s)=>a+parseFloat(ovs(s)),0)/n:0;
    return<Bg dir={dir}><div style={{maxWidth:480,margin:"0 auto",padding:"0 16px 40px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 0 14px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}><Back onClick={()=>setView("menu")}/><h2 style={{margin:0,fontSize:18,fontWeight:800}}>{t("Team Dashboard","لوحة تحكم الفريق")}</h2></div>
        <LangBtn lang={lang} setLang={l=>{setLang(l);sv("genset_lang",l);}}/>

      <SyncBanner online={online} syncing={syncing} t={t}/>
      {n===0?<div style={{textAlign:"center",padding:"60px 0",color:C.muted}}><div style={{fontSize:48,marginBottom:12}}>📋</div>{t("No surveys yet.","لا توجد فحوصات بعد.")}</div>:(
        <div>
          <Card title={t("Overall Performance","الأداء العام")} icon="🏆">

              <Ring score={ca.engine} label="Engine" labelAr="محرك" sz={84}/>
              <Ring score={ca.tech} label="Tech" labelAr="الفني" sz={84}/>

          {Object.keys(techMap).length>0&&<Card title={t("Technician Leaderboard","تصنيف الفنيين")} icon="👷">
            {Object.entries(techMap).map(([name,list])=>({name,avg:list.reduce((a,s)=>a+parseFloat(ovs(s)),0)/list.length,count:list.length})).sort((a,b)=>b.avg-a.avg).map((tk,i)=>(
              <div key={tk.name} style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontWeight:600,fontSize:14}}>{i+1}. {tk.name}</span>
                  <span style={{color:sc(tk.avg),fontWeight:700,fontSize:14}}>{tk.avg.toFixed(2)} <span style={{color:C.muted,fontWeight:400,fontSize:12}}>({tk.count} {t("jobs","مهمة")})</span></span>
                </div>
                <div style={{height:8,borderRadius:4,background:C.border}}><div style={{width:((tk.avg/5)*100)+"%",height:"100%",borderRadius:4,background:sc(tk.avg)}}/></div>
              </div>
            ))}
          </Card>}
        </div>
      )}
    </div></Bg>;
  }

  /* ── HISTORY ── */
  if(view==="history"){
    return<Bg dir={dir}><div style={{maxWidth:480,margin:"0 auto",padding:"0 16px 40px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 0 14px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}><Back onClick={()=>setView("menu")}/><div><h2 style={{margin:0,fontSize:18,fontWeight:800}}>{t("Inspection History","سجل الفحوصات")}</h2><div style={{color:C.muted,fontSize:12}}>{subs.length} {t("records","سجل")}</div></div></div>
        <LangBtn lang={lang} setLang={l=>{setLang(l);sv("genset_lang",l);}}/>
      </div>
      <SyncBanner online={online} syncing={syncing} t={t}/>
      {subs.length===0?<div style={{textAlign:"center",padding:"60px 0",color:C.muted}}><div style={{fontSize:48,marginBottom:12}}>📂</div>{t("No records yet.","لا توجد سجلات بعد.")}</div>:(
        <div>{subs.map(s=>{const o=parseFloat(ovs(s));return(
          <div key={s.id} style={{background:C.card,border:"1px solid "+C.border,borderRadius:13,padding:"14px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{cursor:"pointer",flex:1}} onClick={()=>{setSel(s);setView("detail");}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
                <span style={{fontWeight:700,fontSize:15}}>{s.customerName||t("Unknown","غير معروف")}</span>
                {o>=4?<Bdg label={t("Good","جيد")} color={C.green} bg="rgba(46,160,67,0.15)"/>:o>=3?<Bdg label={t("Avg","متوسط")} color={C.yellow} bg="rgba(210,153,34,0.15)"/>:<Bdg label="⚠" color={C.red} bg="rgba(207,32,38,0.15)"/>}
                {s.followUpRequired&&!s.followUpDone&&<Bdg label={t("Follow-Up","متابعة")}/>}
              </div>
              <div style={{color:C.muted,fontSize:12}}>{s.technicianName||"-"}{s.date?" · "+fmtD(s.date):""}</div>
              <div style={{color:C.muted,fontSize:12,marginTop:1}}>{s.generatorModel||"-"}{s.serialNumber?" · S/N: "+s.serialNumber:""}</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8}}>
              <div style={{color:sc(o),fontWeight:900,fontSize:24}}>{o.toFixed(1)}</div>
              <button onClick={()=>delSub(s.id)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:18,padding:0}}>🗑</button>
            </div>
          </div>
        );})}</div>
      )}
    </div></Bg>;
  }

  /* ── FOLLOW-UPS ── */
  if(view==="followups"){
    const all=subs.filter(s=>s.followUpRequired),pending=all.filter(s=>!s.followUpDone),completed=all.filter(s=>s.followUpDone);
    const today=new Date().toISOString().slice(0,10);
    const overdue=pending.filter(s=>s.followUpDate&&s.followUpDate<today),upcoming=pending.filter(s=>!s.followUpDate||s.followUpDate>=today);
    return<Bg dir={dir}><div style={{maxWidth:480,margin:"0 auto",padding:"0 16px 40px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 0 14px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}><Back onClick={()=>setView("menu")}/><div><h2 style={{margin:0,fontSize:18,fontWeight:800}}>{t("Follow-Up Tracker","متابعة المهام")}</h2><div style={{color:C.muted,fontSize:12}}>{pending.length} {t("pending","معلق")} · {completed.length} {t("done","منجز")}</div></div></div>
        <LangBtn lang={lang} setLang={l=>{setLang(l);sv("genset_lang",l);}}/>
      </div>
      <SyncBanner online={online} syncing={syncing} t={t}/>
      {all.length===0?<div style={{textAlign:"center",padding:"60px 0",color:C.muted}}><div style={{fontSize:48,marginBottom:12}}>✅</div>{t("No follow-ups required.","لا توجد متابعات مطلوبة.")}</div>:(
        <div>
          {overdue.length>0&&<div><div style={{color:C.red,fontWeight:800,fontSize:13,marginBottom:10}}>🚨 {t("OVERDUE","متأخرة")}</div>{overdue.map(s=><FUCard key={s.id} s={s} onDone={()=>markDone(s.id)} onView={()=>{setSel(s);setView("detail");}} overdue t={t}/>)}</div>}
          {upcoming.length>0&&<div><div style={{color:C.accent,fontWeight:800,fontSize:13,marginBottom:10,marginTop:overdue.length>0?16:0}}>📅 {t("UPCOMING","قادمة")}</div>{upcoming.map(s=><FUCard key={s.id} s={s} onDone={()=>markDone(s.id)} onView={()=>{setSel(s);setView("detail");}} t={t}/>)}</div>}
          {completed.length>0&&<div><div style={{color:C.green,fontWeight:800,fontSize:13,marginBottom:10,marginTop:16}}>✅ {t("COMPLETED","منجزة")}</div>{completed.map(s=><FUCard key={s.id} s={s} done onView={()=>{setSel(s);setView("detail");}} t={t}/>)}</div>}
        </div>
      )}
    </div></Bg>;
  }

  /* ── DETAIL ── */
  if(view==="detail"&&sel){const o=ovs(sel);return<Bg dir={dir}><div style={{maxWidth:480,margin:"0 auto",padding:"0 16px 40px"}}>
    <div style={{display:"flex",alignItems:"center",gap:12,padding:"18px 0 14px"}}><Back onClick={()=>setView("history")}/><h2 style={{margin:0,fontSize:18,fontWeight:800}}>{t("Inspection Report","تقرير الفحص")}</h2></div>
    <Card title={t("Job Info","معلومات المهمة")} icon="📋">
      {[[t("Customer","العميل"),sel.customerName],[t("Technician","الفني"),sel.technicianName],[t("Date","التاريخ"),fmtD(sel.date)],[t("Location","الموقع"),sel.siteLocation],[t("Model","الموديل"),sel.generatorModel],["S/N",sel.serialNumber],[t("Service","الخدمة"),sel.serviceType]].filter(([,v])=>v).map(([l,v])=>(
        <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid "+C.border,fontSize:14}}>
          <span style={{color:C.muted}}>{l}</span><span style={{fontWeight:600}}>{v}</span>
        </div>
      ))}
    </Card>
    <Card title={t("Scores","التقييمات")} icon="📊">
      <div style={{display:"flex",justifyContent:"space-around",flexWrap:"wrap",gap:12}}>
        <Ring score={parseFloat(o)} label="Overall" labelAr="الإجمالي" sz={76}/>
        <Ring score={sel.scores.physical} label="Physical" labelAr="خارجي" sz={76}/>
        <Ring score={sel.scores.engine} label="Engine" labelAr="محرك" sz={76}/>
        <Ring score={sel.scores.tech} label="Tech" labelAr="الفني" sz={76}/>
        <Ring score={sel.scores.csat} label="CSAT" labelAr="العميل" sz={76}/>
      </div>
      {sel.smokeColor&&<div style={{marginTop:12,fontSize:13,color:C.muted}}>{t("Exhaust Smoke:","دخان العادم:")} <strong style={{color:C.text}}>{sel.smokeColor}</strong></div>}

      <div style={{fontWeight:800,color:C.accent,marginBottom:4}}>🔔 {t("Follow-Up","متابعة")} {sel.followUpDone?t("— DONE ✅","— تم ✅"):""}</div>
      {sel.followUpDate&&<div style={{color:C.muted,fontSize:13}}>{t("Date:","التاريخ:")} <strong style={{color:C.text}}>{fmtD(sel.followUpDate)}</strong></div>}

  /* ── SUBMITTED ── */

    <div style={{maxWidth:360,padding:"32px 24px",textAlign:"center"}}>
      <div style={{fontSize:60,marginBottom:14}}>✅</div>
      <h2 style={{margin:"0 0 6px",fontSize:22,fontWeight:800}}>{t("Survey Submitted","تم إرسال الفحص")}</h2>
      <p style={{color:C.muted,marginBottom:8}}>{t("Saved to cloud — visible to all team members now.","تم الحفظ في السحابة — مرئي للفريق الآن.")}</p>
      <div style={{color:sc(ov),fontSize:52,fontWeight:900,marginBottom:4}}>{ov.toFixed(2)}</div>

      </div>
    </div>
  </div></Bg>;}

  /* ── SURVEY FORM ── */
  return<Bg dir={dir}><div style={{maxWidth:480,margin:"0 auto",padding:"0 16px 80px"}}>

      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <Back onClick={()=>setView("menu")}/>
        <div><h2 style={{margin:0,fontSize:16,fontWeight:800}}>{t("Inspection Survey","نموذج الفحص")}</h2><div style={{color:C.muted,fontSize:11}}>{STEPS[step]} · {step+1}/{STEPS.length}</div></div>

        </div>
      </div>}
      {[["jobId",t("Job / Work Order ID","رقم أمر العمل"),"WO-2024-001","text"],["date",t("Inspection Date","تاريخ الفحص"),"","date"],["technicianName",t("Technician Name","اسم الفني"),t("e.g. Ahmed Hassan","مثال: أحمد حسن"),"text"],["customerName",t("Customer Name","اسم العميل"),t("Company or person","شركة أو شخص"),"text"],["siteLocation",t("Site Location","الموقع"),t("City / Address","المدينة / العنوان"),"text"],["generatorModel",t("Generator Model","موديل المولد"),"e.g. Cummins C275D5","text"],["serialNumber",t("Serial Number","الرقم التسلسلي"),"S/N","text"]].map(([k,l,p,tp])=>(
        <div key={k} style={{marginBottom:12}}>
          <div style={{color:C.muted,fontSize:11,marginBottom:4,fontWeight:600,textTransform:"uppercase"}}>{l}</div>
          <Inp type={tp} value={survey[k]} onChange={v=>sf(k,v)} placeholder={p} lang={lang}/>
        </div>
      ))}
      <div style={{marginBottom:12}}>
        <div style={{color:C.muted,fontSize:11,marginBottom:4,fontWeight:600,textTransform:"uppercase"}}>{t("Service Type","نوع الخدمة")}</div>
        <select value={survey.serviceType} onChange={e=>sf("serviceType",e.target.value)} style={{width:"100%",background:"rgba(10,16,24,0.85)",border:"1px solid "+C.border,borderRadius:8,color:C.text,padding:"10px 12px",fontSize:14,outline:"none"}}>
          <option value="">{t("Select...","اختر...")}</option>
          {SVC_EN.map((en,i)=><option key={en} value={en}>{en} / {SVC_AR[i]}</option>)}
        </select>
      </div>
    </Card>}

    {step===1&&<Card title={t("Physical Inspection","الفحص الخارجي")} icon="🔍">
      {PHY.map(([k,en,ar])=><div key={k} style={{marginBottom:16}}><QLabel en={en} ar={ar}/><Stars value={survey.physical[k]} onChange={v=>sf("physical."+k,v)} lang={lang}/></div>)}
      <AvgBar v={ph} t={t}/>
    </Card>}

    {step===2&&<Card title={t("Engine & Electrical","المحرك والكهرباء")} icon="⚙️">
      {ENG.map(([k,en,ar])=><div key={k} style={{marginBottom:16}}>
        <QLabel en={en} ar={ar}/>
        {k==="exhaustSmoke"?<div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
            {SMOKE_EN.map((o,i)=><button key={o} onClick={()=>sf("smokeColor",o)} style={{background:survey.smokeColor===o?C.accent:C.border,color:survey.smokeColor===o?"#0D0800":C.muted,border:"none",borderRadius:7,padding:"6px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>{o}<br/><span style={{fontSize:9,opacity:0.8}}>{SMOKE_AR[i]}</span></button>)}
          </div>
          <Stars value={survey.engine[k]} onChange={v=>sf("engine."+k,v)} lang={lang}/>
        </div>:<Stars value={survey.engine[k]} onChange={v=>sf("engine."+k,v)} lang={lang}/>}
      </div>)}
      <AvgBar v={en_} t={t}/>
    </Card>}

    {step===3&&<Card title={t("Parts & Maintenance","القطع والصيانة")} icon="🔧">
      <div style={{marginBottom:12,color:C.muted,fontSize:13}}>{t("Completed:","المنجز:")} <strong style={{color:C.text}}>{dc(survey.parts)}</strong></div>
      {PRT.map(([k,en,ar])=><Tog key={k} checked={survey.parts[k]} onChange={v=>sf("parts."+k,v)} en={en} ar={ar}/>)}
      <div style={{marginTop:10}}>
        <QLabel en={t("Notes","ملاحظات")} ar={lang==="en"?"ملاحظات":"Notes"}/>
        <Txa value={survey.partsNotes} onChange={v=>sf("partsNotes",v)} placeholder={t("Part numbers, quantities...","أرقام القطع، الكميات...")} lang={lang}/>
      </div>
    </Card>}

    {step===4&&<Card title={t("Technician Performance","أداء الفني")} icon="👷">
      {TEC.map(([k,en,ar])=><div key={k} style={{marginBottom:16}}><QLabel en={en} ar={ar}/><Stars value={survey.tech[k]} onChange={v=>sf("tech."+k,v)} lang={lang}/></div>)}
      <AvgBar v={te} t={t}/>
    </Card>}

    {step===5&&<Card title={t("Customer Satisfaction","رضا العميل")} icon="⭐">
      {CST.map(([k,en,ar])=><div key={k} style={{marginBottom:16}}><QLabel en={en} ar={ar}/><Stars value={survey.csat[k]} onChange={v=>sf("csat."+k,v)} lang={lang}/></div>)}
      <AvgBar v={csat} t={t}/>
      <div style={{marginTop:14}}>
        <QLabel en={t("Customer Comments","تعليقات العميل")} ar={lang==="en"?"تعليقات العميل":"Customer Comments"}/>
        <Txa value={survey.customerComments} onChange={v=>sf("customerComments",v)} placeholder={t("Feedback...","التعليقات...")} lang={lang}/>
      </div>
    </Card>}

    {step===6&&<div>
      <Card title={t("Score Summary","ملخص التقييم")} icon="📊">
        <div style={{display:"flex",justifyContent:"space-around",flexWrap:"wrap",gap:12,marginBottom:14}}>
          <Ring score={ov} label="Overall" labelAr="الإجمالي" sz={76}/>
          <Ring score={ph} label="Physical" labelAr="خارجي" sz={76}/>
          <Ring score={en_} label="Engine" labelAr="محرك" sz={76}/>
          <Ring score={te} label="Tech" labelAr="الفني" sz={76}/>
          <Ring score={csat} label="CSAT" labelAr="العميل" sz={76}/>
        </div>
        <div style={{color:C.muted,fontSize:13}}>{t("Checklist:","القائمة:")} <strong style={{color:C.text}}>{dc(survey.parts)}</strong> {t("completed","منجز")}</div>
      </Card>
      <Card title={t("Issues & Follow-Up","المشكلات والمتابعة")} icon="⚠️" accent={C.accent}>
        <QLabel en={t("Issues Observed","المشكلات الملاحظة")} ar={lang==="en"?"المشكلات الملاحظة":"Issues Observed"}/>
        <Txa value={survey.issues} onChange={v=>sf("issues",v)} placeholder={t("Issues found...","المشكلات الملاحظة...")} lang={lang}/>
        <div style={{marginTop:10}}><Tog checked={survey.followUpRequired} onChange={v=>sf("followUpRequired",v)} en={t("Follow-up visit required","مطلوب زيارة متابعة")} ar={lang==="en"?"مطلوب زيارة متابعة":"Follow-up visit required"}/></div>
        {survey.followUpRequired&&<div>
          <QLabel en={t("Follow-up Date","تاريخ المتابعة")} ar={lang==="en"?"تاريخ المتابعة":"Follow-up Date"}/>
          <Inp type="date" value={survey.followUpDate} onChange={v=>sf("followUpDate",v)} lang={lang}/>
          <div style={{marginTop:10}}>
            <QLabel en={t("Action Required","الإجراء المطلوب")} ar={lang==="en"?"الإجراء المطلوب":"Action Required"}/>
            <Txa value={survey.followUpNotes} onChange={v=>sf("followUpNotes",v)} placeholder={t("What needs to be done...","ما الذي يجب القيام به...")} lang={lang}/>
          </div>
        </div>}
      </Card>
      <button onClick={submitSurvey} style={{width:"100%",background:"linear-gradient(135deg,#F5A623,#C47B0A)",color:"#0D0800",border:"none",borderRadius:13,padding:"20px",fontSize:17,fontWeight:900,cursor:"pointer",boxShadow:"0 4px 20px rgba(245,166,35,0.4)",marginTop:8}}>
        {syncing?t("Saving to cloud... 🔄","جاري الحفظ... 🔄"):("✅ "+t("Submit Inspection Survey","إرسال نتائج الفحص"))}
      </button>
    </div>}

    <div style={{display:"flex",gap:10,marginTop:16}}>
      {step>0&&<SBtn flex onClick={()=>setStep(step-1)}>&#8592; {t("Back","رجوع")}</SBtn>}
      {step<STEPS.length-1&&<button onClick={()=>setStep(step+1)} style={{flex:1,background:"linear-gradient(135deg,#F5A623,#C47B0A)",color:"#0D0800",border:"none",borderRadius:11,padding:"14px",fontSize:14,fontWeight:900,cursor:"pointer"}}>{t("Continue","متابعة")} &#8594;</button>}
    </div>
  </div></Bg>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
