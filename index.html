function ovs(s){return((s.scores.physical+s.scores.engine+s.scores.tech+s.scores.csat)/4).toFixed(2);}
function isScoreable(s){
  // Only Preventive Maintenance counts for branch/tech avg scores
  return !s.serviceType||s.serviceType==="Preventive Maintenance";
}
function isCMScoreable(s){
  // CM counts for tech score when it's a tech-caused defect and scores were filled
  return s.serviceType==="Corrective Maintenance"&&s.scores&&(s.scores.physical>0||s.scores.engine>0||s.scores.tech>0);
}
function isCCTechScoreable(s){
  // Customer Complaint counts for tech score when rootCause=technician

    <button onClick={()=>setPage(p=>Math.min(pages-1,p+1))} disabled={page>=pages-1}

}

function parseCust(rows){
  if(!rows||rows.length<2)return[];
  const hdrs=(rows[0]||[]).map(h=>String(h||"").toLowerCase().trim());
  const get=(row,...names)=>{for(const n of names){const i=hdrs.findIndex(h=>h.includes(n));if(i>=0&&row[i]!=null)return String(row[i]).trim();}return"";};
  return rows.slice(1).filter(r=>r&&r.some(c=>c)).map((r)=>({
    customerName:get(r,"customer","client","name","company","account"),
    siteLocation:get(r,"site","location","address","city","area"),
    generatorModel:get(r,"model","generator","genset","unit"),
    serialNumber:get(r,"serial","s/n","sn"),
    contactPerson:get(r,"contact","person","rep"),
    phone:get(r,"phone","mobile","tel"),
    serviceType:get(r,"service","type"),
    branch:get(r,"branch","فرع","region"),
  })).filter(c=>c.customerName);
}

function parseUsers(rows){
  if(!rows||rows.length<2)return[];
  // Try header row first, fall back to positional (col A=username, B=password, C=fullName, D=role, E=branch)
  const hdrs=(rows[0]||[]).map(h=>String(h||"").toLowerCase().trim());
  const hasHdr=hdrs.some(h=>h.includes("user")||h.includes("pass")||h.includes("role"));
  const get=(row,...names)=>{for(const n of names){const i=hdrs.findIndex(h=>h.includes(n));if(i>=0&&row[i]!=null)return String(row[i]).trim();}return"";};
  const dataRows=hasHdr?rows.slice(1):rows;
  return dataRows.filter(r=>r&&r.some(c=>c)).map(r=>({
    username: hasHdr?get(r,"username","user","login"):String(r[0]||"").trim(),
    password: hasHdr?get(r,"password","pass","كلمة"):String(r[1]||"").trim(),
    fullName: hasHdr?get(r,"name","full","اسم"):String(r[2]||"").trim(),
    role:     hasHdr?get(r,"role","دور","type"):String(r[3]||"").trim(),
    branch:   hasHdr?get(r,"branch","فرع","region"):String(r[4]||"").trim(),
  })).filter(u=>u.username&&u.password&&u.username.length>0);
}

function parseBranches(rows){
  if(!rows||rows.length<2)return[];
  const hdrs=(rows[0]||[]).map(h=>String(h||"").toLowerCase().trim());
  const get=(row,...names)=>{for(const n of names){const i=hdrs.findIndex(h=>h.includes(n));if(i>=0&&row[i]!=null)return String(row[i]).trim();}return"";};
  return rows.slice(1).filter(r=>r&&r.some(c=>c)).map(r=>({
    code:get(r,"code","رمز","id"),
    nameEn:get(r,"english","en","name","اسم"),
    nameAr:get(r,"arabic","ar","عربي"),
  })).filter(b=>b.nameEn);
}

/* ══ LOGIN SCREEN ═════════════════════════════════════ */
function LoginScreen({onLogin,lang,onLangToggle,theme,toggleTheme}){
  const t=makeT(lang);
  const[username,setUsername]=useState("");
  const[password,setPassword]=useState("");
  const[error,setError]=useState("");
  const[loading,setLoading]=useState(false);
  const[showPw,setShowPw]=useState(false);

  async function doLogin(){
    if(!username.trim()||!password.trim()){setError(t("Please enter username and password","أدخل اسم المستخدم وكلمة المرور"));return;}
    setLoading(true);setError("");
    try{
      // Step 1: Find user profile by username in Firestore
      const snap=await db.collection("users").where("username","==",username.trim().toLowerCase()).get();
      if(snap.empty){
        await db.collection("failedLogins").add({username:username.trim(),reason:"username_not_found",time:new Date().toISOString(),device:navigator.userAgent.slice(0,80)}).catch(()=>{});
        setError(t("Username not found","اسم المستخدم غير موجود"));setLoading(false);return;
      }
      const doc=snap.docs[0];
      const userData=doc.data();
      const userDocId=doc.id;
      const email=userData.email||(username.trim().toLowerCase()+"@genset-app.com");

      // Step 2: Authenticate with Firebase Auth (secure - password never stored in plain text)
      try{
        await auth.signInWithEmailAndPassword(email, password);
      }catch(authErr){
        // Track failed attempt
        await db.collection("failedLogins").add({username:username.trim(),reason:"wrong_password",time:new Date().toISOString(),device:navigator.userAgent.slice(0,80)}).catch(()=>{});
        // Check if 3+ failures in 10 mins → notify admin
        const tenMinsAgo=new Date(Date.now()-10*60*1000).toISOString();
        const recentFails=await db.collection("failedLogins").where("username","==",username.trim()).get().catch(()=>({docs:[]}));
        const failCount=recentFails.docs.filter(d=>d.data().time>tenMinsAgo).length;
        if(failCount>=3){
          await db.collection("notifications").add({branch:"ALL",title:"⚠️ "+t("Multiple Failed Login Attempts","محاولات دخول فاشلة متعددة"),message:t("User","المستخدم")+" '"+username.trim()+"' "+t("failed login","فشل الدخول")+" "+failCount+" "+t("times in 10 mins","مرات في 10 دقائق"),custName:username.trim(),sentBy:"System",createdAt:new Date().toISOString(),read:false,type:"security"}).catch(()=>{});
        }
        if(authErr.code==="auth/wrong-password"||authErr.code==="auth/invalid-credential"||authErr.code==="auth/invalid-login-credentials")
          setError(t("Wrong password","كلمة المرور غير صحيحة"));
        else if(authErr.code==="auth/too-many-requests")
          setError(t("Too many attempts. Try again later.","محاولات كثيرة. حاول لاحقاً."));
        else if(authErr.code==="auth/user-not-found")
          setError(t("Account not set up. Contact admin.","الحساب غير مكتمل. تواصل مع المدير."));
        else
          setError(t("Wrong password","كلمة المرور غير صحيحة"));
        setLoading(false);return;
      }

      // Step 3: Check for existing active session (single device)
      const existingSession=await db.collection("sessions").doc(userDocId).get().catch(()=>null);
      if(existingSession&&existingSession.exists){
        const sess=existingSession.data();
        const lastSeen=sess.lastSeen?new Date(sess.lastSeen):new Date(0);
        const minsSince=(new Date()-lastSeen)/60000;
        if(minsSince<30&&sess.token!==localStorage.getItem("genset_token_"+userDocId)){
          await auth.signOut().catch(()=>{});
          setError(t("This account is already logged in on another device!","هذا الحساب مسجل دخوله على جهاز آخر!"));
          setLoading(false);return;
        }
      }

      // Step 4: Register session
      const sessionToken=Math.random().toString(36).slice(2)+Date.now();
      await db.collection("sessions").doc(userDocId).set({token:sessionToken,username:userData.username,lastSeen:new Date().toISOString(),device:navigator.userAgent.slice(0,50)}).catch(()=>{});
      localStorage.setItem("genset_token_"+userDocId,sessionToken);
      onLogin({...userData,id:userDocId,sessionToken,userDocId});

    }catch(e){
      console.error("Login error:",e.code,e.message);
      if(e.code&&e.code.includes("auth/"))
        setError(t("Wrong password","كلمة المرور غير صحيحة"));
      else if(e.message&&(e.message.includes("network")||e.message.includes("offline")))
        setError(t("No internet connection.","لا يوجد اتصال بالإنترنت."));
      else
        setError(t("Connection error. Check internet.","خطأ في الاتصال."));
    }
    setLoading(false);
  }

  return<Bg dir={lang==="ar"?"rtl":"ltr"}>
    <div style={{maxWidth:400,margin:"0 auto",padding:"0 20px",minHeight:"100vh",display:"flex",flexDirection:"column",justifyContent:"center"}}>
      <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginBottom:20}}><LangBtn lang={lang} onToggle={onLangToggle}/><ThemeBtn theme={theme||"dark"} onToggle={toggleTheme||function(){}}/></div>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:80,height:80,borderRadius:"50%",background:"linear-gradient(135deg,#F5A623,#C47B0A)",boxShadow:"0 0 36px rgba(245,166,35,0.5)",fontSize:36,marginBottom:16}}>⚡</div>
        <h1 style={{margin:0,fontSize:24,fontWeight:900}}>GenSet Aftersales</h1>
        <p style={{margin:"8px 0 0",color:C.muted,fontSize:13}}>{t("Diesel Generator Inspection System","نظام فحص المولدات الديزل")}</p>
      </div>

      <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:16,padding:"24px 20px"}}>
        <h2 style={{margin:"0 0 20px",fontSize:17,fontWeight:800,textAlign:"center"}}>{t("Sign In","تسجيل الدخول")}</h2>

        <div style={{marginBottom:14}}>
          <div style={{color:C.muted,fontSize:11,marginBottom:5,fontWeight:600,textTransform:"uppercase"}}>{t("Username","اسم المستخدم")}</div>
          <Inp value={username} onChange={setUsername} placeholder={t("Enter username","أدخل اسم المستخدم")}/>
        </div>

        <div style={{marginBottom:6}}>
          <div style={{color:C.muted,fontSize:11,marginBottom:5,fontWeight:600,textTransform:"uppercase"}}>{t("Password","كلمة المرور")}</div>
          <div style={{position:"relative"}}>
            <input type={showPw?"text":"password"} value={password} onChange={e=>setPassword(e.target.value)}
              placeholder={t("Enter password","أدخل كلمة المرور")}
              onKeyDown={e=>e.key==="Enter"&&doLogin()}
              autoComplete="current-password"
              readOnly={false}
              style={{width:"100%",background:C.bg,border:"1px solid "+C.border,borderRadius:8,color:C.text,padding:"10px 40px 10px 12px",fontSize:14,outline:"none",boxSizing:"border-box"}}/>
            <button onClick={()=>setShowPw(!showPw)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:16}}>{showPw?"🙈":"👁"}</button>
          </div>
        </div>

        {error&&<div style={{color:C.red,fontSize:12,marginBottom:12,padding:"8px 12px",background:"rgba(207,32,38,0.1)",borderRadius:8}}>{error}</div>}

        <PBtn full onClick={doLogin} disabled={loading}>{loading?t("Signing in...","جاري الدخول..."):"→ "+t("Sign In","تسجيل الدخول")}</PBtn>
      </div>

      <div style={{textAlign:"center",marginTop:20,color:C.muted,fontSize:11}}>
        {t("Contact your admin if you don't have an account","تواصل مع المدير إذا لم يكن لديك حساب")}
      </div>
    </div>
  </Bg>;
}

  async function importUsersExcel(e){

      const wsName=wb.SheetNames.find(n=>n.toLowerCase().includes("user"))||wb.SheetNames[0];
      const ws=wb.Sheets[wsName];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      const parsed=parseUsers(rows);
      setSyncing(true);
      let created=0, skipped=0;
      for(const u of parsed){
        const uname=u.username.toLowerCase().trim();
        const email=uname+"@genset-app.com";
        try{
          // Check if username already exists in Firestore
          const existing=await db.collection("users").where("username","==",uname).get();
          if(!existing.empty){skipped++;continue;}
          // Try to create Firebase Auth account
          let uid=null;
          try{
            const cred=await auth.createUserWithEmailAndPassword(email,u.password);
            uid=cred.user.uid;
          }catch(authErr){
            if(authErr.code==="auth/email-already-in-use"){
              // Auth account exists but no Firestore profile
              // Sign in to get the UID
              try{

/* ══ FOLLOW-UP CARD ═══════════════════════════════════ */
function FUCard({s,onDone,onView,overdue,done,t,lang,user,db,branches,subs}){
  const o=parseFloat(ovs(s));
  const stMap={"Preventive Maintenance":["🔧","PM",C.green],"Corrective Maintenance":["🔨","CM",C.accent],"PDI Inspection":["🔍","PDI",C.blue],"Warranty Claim":["🛡️","WC",C.red],"Customer Complaint":["📝","CC","#9B59B6"]};
  const[stIc,stAb,stCl]=stMap[s.serviceType||"Preventive Maintenance"]||["🔧","PM",C.green];
  const isPending=s.approvalStatus==="pending"||s.approvalStatus==="pending_admin"||s.approvalStatus==="pending_manager";
  const isClosurePending=s.closurePending===true&&!s.followUpDone;

  // Warranty Claim that is fully approved → bypass closure dialog, use existing WC#
  const isApprovedWarranty=s.serviceType==="Warranty Claim"&&s.approvalStatus==="approved"&&s.wcNumber;

  const[showClosure,setShowClosure]=React.useState(false);
  const[closureType,setClosureType]=React.useState("");
  const[closureRef,setClosureRef]=React.useState("");
  const[saving,setSaving]=React.useState(false);

  const CLOSURE_TYPES=[
    ["quotation",t("Quotation Number","رقم العرض"),"QT-"],
    ["invoice",t("Invoice Number","رقم الفاتورة"),"INV-"],
    ["workorder",t("Work Order Number","رقم أمر العمل"),"WO-"],
    ["manager",t("Manager Approval","موافقة المدير"),""],
  ];
  const selectedClosure=CLOSURE_TYPES.find(([v])=>v===closureType);
  const canClose=closureType&&(closureType==="manager"||closureRef.trim());

  async function handleWarrantyDone(){
    // Directly close with the existing WC# — no dialog, no overwrite
    setSaving(true);
    try{
      await db.collection("surveys").doc(s.id).update({
        followUpDone:true,
        closureType:"warranty",
        closureRef:s.wcNumber,   // use the WC# set by admin — never overwrite
        closedAt:new Date().toISOString(),
        closedBy:user?.username||""
      });
      // Notify warehouse
      await db.collection("notifications").add({
        type:"warranty_done",
        wcNumber:s.wcNumber,
        customerName:s.customerName||"",
        branch:s.branch||"",
        technicianName:s.technicianName||"",
        message:"Warranty claim "+s.wcNumber+" completed for "+s.customerName,
        forRole:"warehouse",
        read:false,
        createdAt:new Date().toISOString()
      });
      if(onDone)onDone();
    }catch(e){alert("Error: "+e.message);}
    setSaving(false);
  }

  async function handleClose(){
    if(!canClose)return;
    setSaving(true);
    try{
      if(closureType==="manager"){
        await db.collection("surveys").doc(s.id).update({
          closurePending:true,
          closureType:"manager",
          closureRef:"",
          closureRequestedBy:user?.username||"",
          closureRequestedAt:new Date().toISOString()
        });
        await db.collection("notifications").add({
          type:"fu_manager_approval",
          surveyId:s.id,
          customerName:s.customerName||"",
          branch:s.branch||"",
          technicianName:s.technicianName||"",
          requestedBy:user?.username||"",
          requestedByFullName:user?.fullName||user?.username||"",
          message:"Follow-up closure approval requested for "+s.customerName+" ("+s.branch+")",
          forRole:"manager",
          forBranch:s.branch||"",
          read:false,
          createdAt:new Date().toISOString()
        });
        alert(t("Request sent to manager! You cannot mark Done until manager approves.","تم الإرسال! لا يمكن الإغلاق حتى موافقة المدير."));
        setSaving(false);setShowClosure(false);return;
      }
      await db.collection("surveys").doc(s.id).update({
        followUpDone:true,
        closureType,
        closureRef:closureRef.trim(),
        closedAt:new Date().toISOString(),
        closedBy:user?.username||""
      });
      if(onDone)onDone();
    }catch(e){alert("Error: "+e.message);}
    setSaving(false);
  }

  return<div style={{background:done?"rgba(46,160,67,0.07)":overdue?"rgba(207,32,38,0.08)":"rgba(245,166,35,0.07)",border:"1px solid "+(done?C.green:overdue?C.red:C.accent),borderRadius:12,padding:"14px 16px",marginBottom:10}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
      <div style={{flex:1,cursor:"pointer"}} onClick={onView}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}>
          <span style={{fontWeight:700,fontSize:15}}>{s.customerName||t("Unknown","غير معروف")}</span>
          <span style={{background:"rgba(0,0,0,0.15)",borderRadius:6,padding:"1px 6px",fontSize:10,fontWeight:700,color:stCl}}>{stIc} {stAb}</span>
          {s.closureType&&s.closureRef&&<span style={{background:"rgba(46,160,67,0.15)",borderRadius:6,padding:"1px 6px",fontSize:10,fontWeight:700,color:C.green}}>🔖 {s.closureRef}</span>}
        </div>
        <div style={{color:C.muted,fontSize:12}}>👷 {s.technicianName||"-"} · 📍 {s.siteLocation||"-"}</div>
        <div style={{color:C.muted,fontSize:12,marginTop:2}}>🗓 {fmtD(s.date)} · ⚙️ {s.generatorModel||"-"}</div>
        {s.branch&&<div style={{fontSize:11,color:C.blue,marginTop:2}}>🏢 {s.branch}</div>}
        {s.followUpDate&&<div style={{fontSize:12,fontWeight:700,color:overdue?C.red:C.accent,marginTop:4}}>{overdue?t("⚠️ Overdue: ","⚠️ متأخر: "):t("📅 Due: ","📅 الموعد: ")}{fmtD(s.followUpDate)}</div>}
        {s.followUpNotes&&<div style={{fontSize:12,color:C.muted,marginTop:5,fontStyle:"italic",borderLeft:"2px solid "+C.border,paddingLeft:8}}>{s.followUpNotes}</div>}
        {isPending&&<div style={{marginTop:4}}><span style={{background:"rgba(155,89,182,0.15)",color:"#9B59B6",borderRadius:6,padding:"2px 8px",fontSize:10,fontWeight:700}}>⏳ {t("Pending Approval","بانتظار الموافقة")}</span></div>}
        {isClosurePending&&<div style={{marginTop:4}}><span style={{background:"rgba(155,89,182,0.15)",color:"#9B59B6",borderRadius:6,padding:"2px 8px",fontSize:10,fontWeight:700}}>⏳ {t("Awaiting Manager Approval to Close","بانتظار موافقة المدير للإغلاق")}</span></div>}
      </div>
      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8,marginLeft:12}}>
        <div style={{color:sc(o),fontWeight:900,fontSize:22}}>{o.toFixed(1)}</div>
        {!done&&!isPending&&!isClosurePending&&isApprovedWarranty&&(user?.role==="supervisor"||user?.role==="branch_manager")&&<div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
          <div style={{color:C.accent,fontSize:10,fontWeight:700,textAlign:"right"}}>🔢 WC#: {s.wcNumber}</div>
          <button onClick={handleWarrantyDone} disabled={saving} style={{background:saving?C.border:C.green,color:"#fff",border:"none",borderRadius:8,padding:"6px 12px",fontWeight:700,cursor:saving?"not-allowed":"pointer",fontSize:12}}>
            {saving?"⏳":("✓ "+t("Done","تم"))}
          </button>
        </div>}
        {!done&&!isPending&&!isClosurePending&&!isApprovedWarranty&&(user?.role==="supervisor"||user?.role==="branch_manager")&&<button onClick={()=>setShowClosure(!showClosure)} style={{background:showClosure?"rgba(46,160,67,0.2)":C.green,color:"#fff",border:"none",borderRadius:8,padding:"6px 12px",fontWeight:700,cursor:"pointer",fontSize:12}}>
          {showClosure?"▲ "+t("Cancel","إلغاء"):"✓ "+t("Done","تم")}
        </button>}
        {!done&&isClosurePending&&<span style={{color:"#9B59B6",fontSize:10,textAlign:"right",maxWidth:70}}>⏳ {t("Awaiting manager","انتظار المدير")}</span>}
        {!done&&isPending&&<span style={{color:"#9B59B6",fontSize:10,textAlign:"right"}}>⏳</span>}
        {done&&<span style={{color:C.green,fontSize:11,fontWeight:700}}>✅ {t("Done","تم")}</span>}
      </div>
    </div>

    {/* Closure panel — not shown for approved warranty claims */}
    {showClosure&&!done&&!isApprovedWarranty&&(user?.role==="supervisor"||user?.role==="branch_manager")&&<div style={{marginTop:12,borderTop:"1px solid "+C.border,paddingTop:12}}>
      <div style={{color:C.accent,fontWeight:700,fontSize:12,marginBottom:8}}>📋 {t("Select closure type to mark done:","اختر نوع الإغلاق:")}</div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {CLOSURE_TYPES.map(([v,lbl,prefix])=>(
          <button key={v} onClick={()=>{setClosureType(v);setClosureRef(prefix);}}
            style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:closureType===v?"linear-gradient(135deg,#D4820A,#B56A08)":C.surface,color:closureType===v?"#fff":C.text,border:"1px solid "+(closureType===v?C.accent:C.border),borderRadius:9,padding:"9px 12px",fontWeight:700,cursor:"pointer",fontSize:13,textAlign:"left"}}>
            <span>{lbl}</span>
            {closureType===v&&<span style={{fontSize:16}}>✓</span>}
          </button>
        ))}
      </div>

      {closureType&&closureType!=="manager"&&<div style={{marginTop:10}}>
        <div style={{color:C.muted,fontSize:11,marginBottom:4,fontWeight:600}}>{selectedClosure?.[1]} *</div>
        <input value={closureRef} onChange={e=>setClosureRef(e.target.value)}
          placeholder={selectedClosure?.[2]+"2026-001"}
          style={{width:"100%",background:C.bg,border:"1px solid "+(closureRef.trim()?C.green:C.accent),borderRadius:8,color:C.text,padding:"9px 12px",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
      </div>}

      {closureType==="manager"&&<div style={{marginTop:8,padding:"8px 10px",background:"rgba(155,89,182,0.1)",borderRadius:8,border:"1px solid rgba(155,89,182,0.3)",color:"#9B59B6",fontSize:12}}>
        📩 {t("A notification will be sent to the line manager for this branch.","سيتم إرسال إشعار للمدير المسؤول عن هذا الفرع.")}
      </div>}

      <button onClick={handleClose} disabled={!canClose||saving}
        style={{width:"100%",marginTop:10,background:canClose?"linear-gradient(135deg,#1A7A2E,#145C22)":"rgba(0,0,0,0.2)",color:canClose?"#fff":C.muted,border:"none",borderRadius:9,padding:"11px",fontWeight:800,cursor:canClose?"pointer":"not-allowed",fontSize:14}}>
        {saving?"⏳ "+t("Saving...","جاري الحفظ..."):(closureType==="manager"?"📩 "+t("Send to Manager","إرسال للمدير"):"✅ "+t("Confirm & Close","تأكيد وإغلاق"))}
      </button>
    </div>}
  </div>;
}

/* ══ EXCEL EXPORT ═════════════════════════════════════ */
function exportExcel(data,t){
  if(!data||data.length===0){alert(t("No data to export","لا توجد بيانات للتصدير"));return;}
  const rows=[
    [t("Customer","العميل"),t("Branch","الفرع"),t("Technician","الفني"),t("Date","التاريخ"),
     t("Physical","خارجي"),t("Engine","محرك"),t("Technician Score","الفني"),t("CSAT","العميل"),
     t("Overall","الإجمالي"),t("Service Type","نوع الخدمة"),t("Issues","المشكلات"),
     t("Follow-Up","متابعة"),t("Follow-Up Date","تاريخ المتابعة"),t("Notes","ملاحظات")],
    ...data.map(s=>[
      s.customerName||"",s.branch||"",s.technicianName||"",s.date||"",
      s.scores.physical>0?s.scores.physical.toFixed(2):"",
      s.scores.engine>0?s.scores.engine.toFixed(2):"",
      s.scores.tech>0?s.scores.tech.toFixed(2):"",
      s.scores.csat>0?s.scores.csat.toFixed(2):"",
      ((s.scores.physical+s.scores.engine+s.scores.tech+s.scores.csat)/4).toFixed(2),
      s.serviceType||"",s.issues||"",
      s.followUpRequired?t("Yes","نعم"):t("No","لا"),
      s.followUpDate||"",s.followUpNotes||""
    ])
  ];
  const ws=XLSX.utils.aoa_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,t("Surveys","الفحوصات"));
  XLSX.writeFile(wb,"GenSet_Report_"+new Date().toISOString().slice(0,10)+".xlsx");
}

/* ══ MANAGER REPORT ═══════════════════════════════════ */
function ManagerReport({subs,branches,onBack,lang,lockedBranch=null,theme,toggleTheme}){
  const t=makeT(lang);
  const[range,setRange]=useState("month");
  const[branchFilter,setBranchFilter]=useState(lockedBranch||"all");
  const curYear=new Date().getFullYear();
  const[selYear,setSelYear]=useState(curYear);
  const[selQ,setSelQ]=useState("all");
  const today=new Date().toISOString().slice(0,10);

  // Derive available years from data
  const years=useMemo(()=>{
    const ys=[...new Set(subs.map(s=>s.date?parseInt(s.date.slice(0,4)):null).filter(Boolean))].sort((a,b)=>b-a);
    return ys.length>0?ys:[curYear];
  },[subs]);

  const data=useMemo(()=>{
    let d=subs;
    if(range==="month")d=d.filter(s=>mStr(s.date)===nowM());
    else if(range==="3m"){const dt=new Date();dt.setMonth(dt.getMonth()-3);d=d.filter(s=>s.date>=dt.toISOString().slice(0,10));}
    else if(range==="year")d=d.filter(s=>s.date&&parseInt(s.date.slice(0,4))===selYear);
    else if(range==="quarter"){
      const qMap={Q1:[1,3],Q2:[4,6],Q3:[7,9],Q4:[10,12]};
      const[qStart,qEnd]=qMap[selQ]||[1,12];
      d=d.filter(s=>{
        if(!s.date)return false;
        const yr=parseInt(s.date.slice(0,4));
        const mo=parseInt(s.date.slice(5,7));
        return yr===selYear&&mo>=qStart&&mo<=qEnd;
      });
    }
    if(branchFilter!=="all")d=d.filter(s=>s.branch===branchFilter);
    return d;
  },[subs,range,branchFilter,selYear,selQ]);

  const scoreData=data.filter(isScoreable);const n=data.length,aov=scoreData.length?scoreData.reduce((a,s)=>a+parseFloat(ovs(s)),0)/scoreData.length:0;
  const pendFU=data.filter(s=>s.followUpRequired&&!s.followUpDone);
  const doneFU=data.filter(s=>s.followUpRequired&&s.followUpDone);
  const low=data.filter(s=>parseFloat(ovs(s))<3).sort((a,b)=>parseFloat(ovs(a))-parseFloat(ovs(b)));
  const techMap={};data.filter(isScoreable).forEach(s=>{if(!s.technicianName)return;if(!techMap[s.technicianName])techMap[s.technicianName]=[];techMap[s.technicianName].push(s);});
  const techRank=Object.entries(techMap).map(([name,list])=>({name,avg:list.reduce((a,s)=>a+parseFloat(ovs(s)),0)/list.length,jobs:list.length})).sort((a,b)=>b.avg-a.avg);
  const csatRows=CST.map(([k,en,ar])=>{const vals=data.filter(s=>s.csat&&s.csat[k]>0).map(s=>s.csat[k]);return{en,ar,avg:vals.length?vals.reduce((a,b)=>a+b)/vals.length:0};});
  const rLabel=range==="month"?t("This Month","هذا الشهر"):range==="3m"?t("Last 3 Months","آخر 3 أشهر"):range==="year"?selYear+" "+t("Full Year","سنة كاملة"):range==="quarter"?(selQ+" "+selYear):t("All Time","كل الوقت");
  const rptDate=new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
  const[rSection,setRSection]=useState("surveys");
  const[rPage,setRPage]=useState(0);
  const MR_PAGE=15;
  const Th=({c})=><th style={{padding:"7px 9px",textAlign:"left",color:C.accent,fontWeight:700,fontSize:11,borderBottom:"1px solid "+C.border,background:"rgba(230,146,10,0.08)"}}>{c}</th>;
  const Td=({c,bold,color})=><td style={{padding:"6px 9px",fontSize:12,color:color||(bold?C.text:C.muted),fontWeight:bold?700:400,borderBottom:"1px solid rgba(42,58,77,0.5)"}}>{c}</td>;

  return<Bg dir={lang==="ar"?"rtl":"ltr"}>
    <div style={{maxWidth:640,margin:"0 auto",padding:"0 16px 40px"}}>
      <div className="no-print" style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 0 14px",flexWrap:"wrap",gap:10}}>

/* ══ STATS EXCEL EXPORT ══════════════════════════════ */
function exportStatsExcel(branchStats,techStats,monthlyData,t){
  const wb=XLSX.utils.book_new();

  // Sheet 1: Branch Statistics
  const bRows=[
    [t("Branch","الفرع"),t("Surveys","الفحوصات"),t("Overall","الإجمالي"),t("Physical","الخارجي"),t("Engine","المحرك"),t("Technician","الفني"),"CSAT",t("FU Pending","متابعة معلقة"),t("FU Done","منجزة"),t("Low Score","تقييم منخفض")],
    ...branchStats.map((b,i)=>[
      b.name,b.n,
      b.overall>0?b.overall.toFixed(2):"-",
      b.physical>0?b.physical.toFixed(2):"-",
      b.engine>0?b.engine.toFixed(2):"-",
      b.tech>0?b.tech.toFixed(2):"-",
      b.csat>0?b.csat.toFixed(2):"-",
      b.fu,b.fuDone,b.low
    ])
  ];
  const ws1=XLSX.utils.aoa_to_sheet(bRows);
  XLSX.utils.book_append_sheet(wb,ws1,t("Branches","الفروع"));

  // Sheet 2: Technician Statistics
  const tRows=[
    [t("Technician","الفني"),t("Branch","الفرع"),t("Jobs","المهام"),t("Overall","الإجمالي"),t("Physical","الخارجي"),t("Engine","المحرك"),t("Tech Score","الفني"),"CSAT",t("FU Pending","متابعة"),t("Low Score","تقييم منخفض")],
    ...techStats.map(tk=>[
      tk.name,tk.branch,tk.n,
      tk.overall>0?tk.overall.toFixed(2):"-",
      tk.physical>0?tk.physical.toFixed(2):"-",
      tk.engine>0?tk.engine.toFixed(2):"-",
      tk.tech>0?tk.tech.toFixed(2):"-",
      tk.csat>0?tk.csat.toFixed(2):"-",
      tk.fu,tk.low
    ])
  ];
  const ws2=XLSX.utils.aoa_to_sheet(tRows);
  XLSX.utils.book_append_sheet(wb,ws2,t("Technicians","الفنيون"));

  // Sheet 3: Monthly Trends
  const mRows=[
    [t("Month","الشهر"),t("Surveys","الفحوصات"),t("Avg Score","متوسط التقييم")],
    ...monthlyData.map(m=>[m.month,m.surveys,m.avg])
  ];
  const ws3=XLSX.utils.aoa_to_sheet(mRows);
  XLSX.utils.book_append_sheet(wb,ws3,t("Trends","الاتجاهات"));

  XLSX.writeFile(wb,"GenSet_Statistics_"+new Date().toISOString().slice(0,10)+".xlsx");
}

/* ══ STATISTICS REPORT ═══════════════════════════════ */
function StatisticsReport({subs,branches,user,onBack,lang,lockedBranch=null,theme,toggleTheme}){
  const t=makeT(lang);
  const[tab,setTab]=useState("branches");
  const[selBranch,setSelBranch]=useState(lockedBranch||"all");
  const[range,setRange]=useState("all");
  const[selMetric,setSelMetric]=useState("overall");
  const curYear=new Date().getFullYear();
  const[selYear,setSelYear]=useState(curYear);
  const[selQ,setSelQ]=useState("Q1");

  const years=useMemo(()=>{
    const ys=[...new Set(subs.map(s=>s.date?parseInt(s.date.slice(0,4)):null).filter(Boolean))].sort((a,b)=>b-a);
    return ys.length>0?ys:[curYear];
  },[subs]);

  // Filter data by range
  const rangeData=useMemo(()=>{
    if(range==="month")return subs.filter(s=>s.date&&s.date.slice(0,7)===new Date().toISOString().slice(0,7));
    if(range==="3m"){const d=new Date();d.setMonth(d.getMonth()-3);return subs.filter(s=>s.date>=d.toISOString().slice(0,10));}
    if(range==="year")return subs.filter(s=>s.date&&parseInt(s.date.slice(0,4))===selYear);
    if(range==="quarter"){
      const qMap={Q1:[1,3],Q2:[4,6],Q3:[7,9],Q4:[10,12]};
      const[qS,qE]=qMap[selQ]||[1,12];
      return subs.filter(s=>{
        if(!s.date)return false;
        const yr=parseInt(s.date.slice(0,4));
        const mo=parseInt(s.date.slice(5,7));
        return yr===selYear&&mo>=qS&&mo<=qE;
      });
    }
    return subs;
  },[subs,range,selYear,selQ]);

  // Branch stats
  const branchStats=useMemo(()=>{
    const bNames=branches.length>0?branches.map(b=>b.nameEn):[...new Set(subs.map(s=>s.branch).filter(Boolean))];
    return bNames.map(name=>{
      const bSubs=rangeData.filter(s=>s.branch===name);
      const n=bSubs.length;
      if(n===0)return{name,n:0,overall:0,physical:0,engine:0,tech:0,csat:0,fu:0,fuDone:0,low:0};
      const avg_=arr=>arr.reduce((a,b)=>a+b,0)/arr.length;
      return{
        name,n,
        overall:avg_(bSubs.map(s=>parseFloat(((s.scores.physical+s.scores.engine+s.scores.tech+s.scores.csat)/4).toFixed(2)))),
        physical:avg_(bSubs.map(s=>s.scores.physical)),
        engine:avg_(bSubs.map(s=>s.scores.engine)),
        tech:avg_(bSubs.map(s=>s.scores.tech)),
        csat:avg_(bSubs.map(s=>s.scores.csat)),
        fu:bSubs.filter(s=>s.followUpRequired&&!s.followUpDone).length,
        fuDone:bSubs.filter(s=>s.followUpRequired&&s.followUpDone).length,
        low:bSubs.filter(s=>parseFloat(((s.scores.physical+s.scores.engine+s.scores.tech+s.scores.csat)/4).toFixed(2))<3).length,
      };
    }).filter(b=>b.n>0||branches.length>0).sort((a,b)=>b.overall-a.overall);
  },[rangeData,branches]);

  // Technician stats
  const techStats=useMemo(()=>{
    const techMap={};
    rangeData.filter(isScoreable).forEach(s=>{
      if(!s.technicianName)return;
      const key=s.technicianName;
      if(!techMap[key])techMap[key]={name:key,branch:s.branch||"",jobs:[],};
      techMap[key].jobs.push(s);
    });
    return Object.values(techMap).map(t=>{
      const jobs=t.jobs;
      const n=jobs.length;
      const avg_=arr=>arr.reduce((a,b)=>a+b,0)/arr.length;
      const ovArr=jobs.map(s=>parseFloat(((s.scores.physical+s.scores.engine+s.scores.tech+s.scores.csat)/4).toFixed(2)));
      return{
        name:t.name,branch:t.branch,n,
        overall:avg_(ovArr),
        physical:avg_(jobs.map(s=>s.scores.physical)),
        engine:avg_(jobs.map(s=>s.scores.engine)),
        tech:avg_(jobs.map(s=>s.scores.tech)),
        csat:avg_(jobs.map(s=>s.scores.csat)),
        fu:jobs.filter(s=>s.followUpRequired&&!s.followUpDone).length,
        low:jobs.filter(s=>parseFloat(((s.scores.physical+s.scores.engine+s.scores.tech+s.scores.csat)/4).toFixed(2))<3).length,
      };
    }).sort((a,b)=>b.overall-a.overall);
  },[rangeData]);

  // Monthly trend data
  const monthlyData=useMemo(()=>{
    const months={};
    subs.forEach(s=>{
      if(!s.date)return;
      const m=s.date.slice(0,7);
      if(!months[m])months[m]={month:m,surveys:0,total:0};
      months[m].surveys++;
      months[m].total+=parseFloat(((s.scores.physical+s.scores.engine+s.scores.tech+s.scores.csat)/4).toFixed(2));
    });
    return Object.values(months).sort((a,b)=>a.month.localeCompare(b.month)).slice(-6).map(m=>({
      ...m,avg:m.surveys>0?(m.total/m.surveys).toFixed(2):0
    }));
  },[subs]);

  // Filtered tech for branch
  const filteredTech=(lockedBranch&&selBranch==="all")?techStats.filter(t=>t.branch===lockedBranch):(selBranch==="all"?techStats:techStats.filter(t=>t.branch===selBranch));

  // SVG Bar Chart
  function BarChart({data,valueKey,labelKey,height=160,maxVal=5}){
    if(!data||data.length===0)return<div style={{color:C.muted,fontSize:12,textAlign:"center",padding:"20px"}}>{t("No data","لا توجد بيانات")}</div>;
    const PALETTE=["#F5A623","#1A6FA8","#2EA043","#9B59B6","#E74C3C","#1ABC9C","#E67E22","#3498DB","#E91E63","#00BCD4"];
    const barW=Math.min(44,Math.floor(280/data.length));
    const gap=6;
    const svgW=data.length*(barW+gap)+20;
    return<div style={{overflowX:"auto"}}>
      <svg width={Math.max(svgW,300)} height={height+50} style={{display:"block"}}>
        {data.map((d,i)=>{
          const val=d[valueKey]||0;
          const barH=val>0?(val/maxVal)*(height-20):2;
          const x=10+i*(barW+gap);
          const y=height-barH;
          const col=PALETTE[i%PALETTE.length];
          return<g key={i}>
            <rect x={x} y={y} width={barW} height={barH} rx={4} fill={col} opacity={0.9}/>
            <text x={x+barW/2} y={y-4} textAnchor="middle" fill={col} fontSize={11} fontWeight={700}>{val>0?parseFloat(val).toFixed(1):""}</text>
            <text x={x+barW/2} y={height+16} textAnchor="middle" fill={C.muted} fontSize={9} fontFamily="Arial">{String(d[labelKey]||"").slice(0,6)}</text>
          </g>;
        })}
        <line x1={10} y1={height} x2={svgW-10} y2={height} stroke={C.border} strokeWidth={1}/>
      </svg>
    </div>;
  }

  // Score ring mini
  function MiniRing({score,label,sz=60}){
    const r=sz/2-6,ci=2*Math.PI*r,da=(score/5)*ci,col=sc(score);
    return<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
      <svg width={sz} height={sz}>
        <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={C.border} strokeWidth={5}/>
        <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={col} strokeWidth={5} strokeDasharray={da+" "+(ci-da)} strokeLinecap="round" transform={"rotate(-90 "+sz/2+" "+sz/2+")"}/>
        <text x={sz/2} y={sz/2+4} textAnchor="middle" fill={col} fontSize={12} fontWeight={700}>{score>0?score.toFixed(1):"-"}</text>
      </svg>
      <span style={{color:C.muted,fontSize:9,textAlign:"center",maxWidth:60}}>{label}</span>
    </div>;
  }

  // Branch Scorecard
  function BranchCard({b,rank}){
    const rankColor=rank===0?"#FFD700":rank===1?"#C0C0C0":rank===2?"#CD7F32":C.muted;
    return<div style={{background:C.card,border:"1px solid "+(b.overall>=4?C.green:b.overall>=3?C.yellow:b.overall>0?C.red:C.border),borderRadius:14,marginBottom:14,overflow:"hidden"}}>
      <div style={{padding:"12px 16px",background:C.surface,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:"50%",background:rankColor,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:14,color:"#0D0800"}}>#{rank+1}</div>
          <div>
            <div style={{fontWeight:800,fontSize:16,color:C.text}}>{b.name}</div>
            <div style={{color:C.muted,fontSize:11}}>{b.n} {t("surveys","فحص")}</div>
          </div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:28,fontWeight:900,color:sc(b.overall)}}>{b.overall>0?b.overall.toFixed(2):"-"}</div>
          <div style={{fontSize:10,color:C.muted}}>{t("Overall / 5.0","الإجمالي / 5.0")}</div>
        </div>
      </div>
      <div style={{padding:"12px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-around",marginBottom:12}}>
          <MiniRing score={b.physical} label={t("Physical","خارجي")}/>
          <MiniRing score={b.engine} label={t("Engine","محرك")}/>
          <MiniRing score={b.tech} label={t("Tech","الفني")}/>
          <MiniRing score={b.csat} label={t("CSAT","العميل")}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[[t("FU Pending","متابعة معلقة"),b.fu,C.accent],[t("FU Done","منجزة"),b.fuDone,C.green],[t("Low Score","تقييم منخفض"),b.low,C.red]].map(([l,v,col])=>(
            <div key={l} style={{background:C.surface,borderRadius:8,padding:"8px",textAlign:"center"}}>
              <div style={{fontSize:18,fontWeight:900,color:col}}>{v}</div>
              <div style={{fontSize:10,color:C.muted,marginTop:2}}>{l}</div>
            </div>
          ))}
        </div>
      </div>
    </div>;
  }

  // Technician Card
  function TechCard({tech,rank}){
    return<div style={{background:C.card,border:"1px solid "+C.border,borderRadius:12,padding:"14px 16px",marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:30,height:30,borderRadius:"50%",background:rank===0?"linear-gradient(135deg,#FFD700,#FFA500)":rank===1?"linear-gradient(135deg,#C0C0C0,#808080)":rank===2?"linear-gradient(135deg,#CD7F32,#8B4513)":C.surface,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,color:rank<3?"#0D0800":C.muted,border:rank>=3?"1px solid "+C.border:"none"}}>#{rank+1}</div>
          <div>
            <div style={{fontWeight:700,fontSize:15}}>{tech.name}</div>
            <div style={{color:C.muted,fontSize:11}}>🏢 {tech.branch||t("No branch","بدون فرع")} · {tech.n} {t("jobs","مهمة")}</div>
          </div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:24,fontWeight:900,color:sc(tech.overall)}}>{tech.overall>0?tech.overall.toFixed(2):"-"}</div>
        </div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        {[["Phy",tech.physical],[t("Eng","محرك"),tech.engine],[t("Tech","فني"),tech.tech],["CSAT",tech.csat]].map(([l,v])=>(
          <div key={l} style={{flex:1,background:C.surface,borderRadius:6,padding:"5px 2px",textAlign:"center"}}>
            <div style={{fontSize:12,fontWeight:700,color:sc(v)}}>{v>0?v.toFixed(1):"-"}</div>
            <div style={{fontSize:9,color:C.muted}}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{height:6,background:C.border,borderRadius:3}}>
        <div style={{height:"100%",width:((tech.overall/5)*100)+"%",background:sc(tech.overall),borderRadius:3,transition:"width 0.5s"}}/>
      </div>
      {tech.low>0&&<div style={{marginTop:6,fontSize:11,color:C.red}}>⚠️ {tech.low} {t("low-score job(s)","مهمة بتقييم منخفض")}</div>}
    </div>;
  }

  const tabs=[
    ["branches",t("Branches","الفروع"),"🏢"],
    ["technicians",t("Technicians","الفنيون"),"👷"],
    ["trends",t("Trends","الاتجاهات"),"📈"],
  ];

  return<Bg dir={lang==="ar"?"rtl":"ltr"}>
    <div style={{maxWidth:540,margin:"0 auto",padding:"0 16px 40px"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 0 14px",flexWrap:"wrap",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <Back onClick={onBack}/>
          <div>
            <h2 style={{margin:0,fontSize:18,fontWeight:800}}>📈 {t("Statistics","الإحصائيات")}</h2>
            <div style={{color:C.muted,fontSize:12}}>{rangeData.length} {t("surveys","فحص")}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>window.print()} style={{background:"linear-gradient(135deg,#F5A623,#C47B0A)",color:"#0D0800",border:"none",borderRadius:9,padding:"8px 14px",fontWeight:800,fontSize:13,cursor:"pointer"}}>📄 PDF</button>
          <button onClick={()=>exportStatsExcel(branchStats,techStats,monthlyData,t)} style={{background:C.surface,color:C.green,border:"1px solid "+C.green,borderRadius:9,padding:"8px 14px",fontWeight:800,fontSize:13,cursor:"pointer"}}>📊 Excel</button>
        </div>
      </div>

      {/* Range filter */}
      <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
        {[["month",t("This Month","هذا الشهر")],["3m",t("Last 3 Months","آخر 3 أشهر")],["year",t("Full Year","سنة كاملة")],["quarter",t("Quarter","ربع سنوي")],["all",t("All Time","كل الوقت")]].map(([v,l])=>(
          <button key={v} onClick={()=>setRange(v)} style={{background:range===v?"linear-gradient(135deg,#F5A623,#C47B0A)":C.surface,color:range===v?"#0D0800":C.muted,border:"1px solid "+(range===v?"#F5A623":C.border),borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>{l}</button>
        ))}
      </div>
      {(range==="year"||range==="quarter")&&<div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{color:C.muted,fontSize:12,fontWeight:600}}>📅 {t("Year","السنة")}:</span>
        {years.map(y=><button key={y} onClick={()=>setSelYear(y)} style={{background:selYear===y?C.blue:C.surface,color:selYear===y?"#fff":C.muted,border:"1px solid "+(selYear===y?C.blue:C.border),borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>{y}</button>)}
      </div>}
      {range==="quarter"&&<div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{color:C.muted,fontSize:12,fontWeight:600}}>📊 {t("Quarter","الربع")}:</span>
        {[["Q1","Jan–Mar"],["Q2","Apr–Jun"],["Q3","Jul–Sep"],["Q4","Oct–Dec"]].map(([q,label])=>(
          <button key={q} onClick={()=>setSelQ(q)} style={{background:selQ===q?"linear-gradient(135deg,#9B59B6,#7D3C98)":C.surface,color:selQ===q?"#fff":C.muted,border:"1px solid "+(selQ===q?"#9B59B6":C.border),borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>{q} <span style={{color:selQ===q?"rgba(255,255,255,0.7)":"#5A7A8A",fontSize:10}}>{label}</span></button>
        ))}
      </div>}

      {/* Tabs */}
      <div style={{display:"flex",gap:8,marginBottom:18}}>
        {tabs.map(([v,l,ic])=>(
          <button key={v} onClick={()=>setTab(v)} style={{flex:1,background:tab===v?"linear-gradient(135deg,#F5A623,#C47B0A)":C.surface,color:tab===v?"#0D0800":C.text,border:"1px solid "+(tab===v?"#F5A623":C.border),borderRadius:10,padding:"10px 6px",fontSize:12,fontWeight:800,cursor:"pointer"}}>{ic} {l}</button>
        ))}
      </div>

      {/* BRANCHES TAB */}
      {tab==="branches"&&<div>
        {/* Branch selector */}
        {branches.length>0&&<div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:14,paddingBottom:4}}>
          {!lockedBranch&&<button onClick={()=>setSelBranch("all")} style={{background:selBranch==="all"?C.blue:C.surface,color:selBranch==="all"?"#fff":C.muted,border:"1px solid "+(selBranch==="all"?C.blue:C.border),borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>🌐 {t("All Branches","جميع الفروع")}</button>}
          {branches.filter(b=>lockedBranch?b.nameEn===lockedBranch:true).map(b=><button key={b.id} onClick={()=>setSelBranch(b.nameEn)} style={{background:selBranch===b.nameEn?C.blue:C.surface,color:selBranch===b.nameEn?"#fff":C.muted,border:"1px solid "+(selBranch===b.nameEn?C.blue:C.border),borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{b.nameEn}</button>)}
        </div>}
        {/* Chart section - changes based on selection */}
        {branchStats.length>0&&<div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"14px 16px",marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:14,color:C.accent,marginBottom:12}}>
            📊 {selBranch==="all"?t("Branch Comparison","مقارنة الفروع"):t("Branch Detail","تفاصيل الفرع")+": "+selBranch}
          </div>
          {selBranch==="all"
            /* ALL BRANCHES: show one bar per branch for selected metric */
            ?<BarChart data={branchStats} valueKey={selMetric} labelKey="name"/>
            /* SINGLE BRANCH: show 5 bars - one per metric */
            :(()=>{
              const b=branchStats.find(x=>x.name===selBranch);
              if(!b)return<div style={{color:C.muted,fontSize:12,padding:"20px",textAlign:"center"}}>{t("No data","لا توجد بيانات")}</div>;
              const metrics=[
                {name:t("Overall","إجمالي"),val:b.overall},
                {name:t("Physical","خارجي"),val:b.physical},
                {name:t("Engine","محرك"),val:b.engine},
                {name:t("Tech","فني"),val:b.tech},
                {name:"CSAT",val:b.csat},
              ];
              return<BarChart data={metrics} valueKey="val" labelKey="name"/>;
            })()
          }
          {/* Metric selector - only shown for All Branches view */}
          {selBranch==="all"&&<div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
            {[["overall",t("Overall","إجمالي")],["physical",t("Physical","خارجي")],["engine",t("Engine","محرك")],["tech",t("Tech","فني")],["csat","CSAT"]].map(([k,l])=>(
              <button key={k} onClick={()=>setSelMetric(k)} style={{background:selMetric===k?"linear-gradient(135deg,#F5A623,#C47B0A)":C.surface,color:selMetric===k?"#0D0800":C.muted,border:"1px solid "+(selMetric===k?"#F5A623":C.border),borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>{l}</button>
            ))}
          </div>}
        </div>}

        {/* Summary KPIs - filtered by selected branch */}
        {branchStats.length>0&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
          {selBranch==="all"?[
            [t("Best Branch","أفضل فرع"),[...branchStats].sort((a,b)=>b.overall-a.overall)[0]?.name||"-",C.green],
            [t("Most Surveys","أكثر فحصاً"),[...branchStats].sort((a,b)=>b.n-a.n)[0]?.name||"-",C.accent],
            [t("Most FU Pending","أكثر متابعات"),[...branchStats].sort((a,b)=>b.fu-a.fu)[0]?.name||"-",C.red],
          ].map(([l,v,col])=>(
            <div key={l} style={{background:C.card,border:"1px solid "+C.border,borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
              <div style={{fontSize:13,fontWeight:800,color:col,marginBottom:3}}>{v}</div>
              <div style={{fontSize:10,color:C.muted}}>{l}</div>
            </div>
          )):(()=>{
            const b=branchStats.find(x=>x.name===selBranch);
            if(!b)return null;
            return[[t("Surveys","الفحوصات"),b.n,C.accent],[t("FU Pending","متابعة معلقة"),b.fu,C.yellow],[t("Low Score","تقييم منخفض"),b.low,C.red]].map(([l,v,col])=>(
              <div key={l} style={{background:C.card,border:"1px solid "+C.border,borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
                <div style={{fontSize:20,fontWeight:900,color:col,marginBottom:3}}>{v}</div>
                <div style={{fontSize:10,color:C.muted}}>{l}</div>
              </div>
            ));
          })()}
        </div>}

        {/* Branch scorecards */}
        {branchStats.length===0?<div style={{textAlign:"center",padding:"60px 0",color:C.muted}}><div style={{fontSize:48,marginBottom:12}}>📊</div>{t("No data for this period.","لا توجد بيانات لهذه الفترة.")}</div>
          :(selBranch==="all"?branchStats:branchStats.filter(b=>b.name===selBranch)).sort((a,b)=>b.overall-a.overall).map((b,i)=><BranchCard key={b.name} b={b} rank={i}/>)}
      </div>}

      {/* TECHNICIANS TAB */}
      {tab==="technicians"&&<div>
        {/* Branch filter */}
        {branches.length>0&&<div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:14,paddingBottom:4}}>
          {!lockedBranch&&<button onClick={()=>setSelBranch("all")} style={{background:selBranch==="all"?C.blue:C.surface,color:selBranch==="all"?"#fff":C.muted,border:"1px solid "+(selBranch==="all"?C.blue:C.border),borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>🌐 {t("All","الكل")}</button>}
          {branches.filter(b=>lockedBranch?b.nameEn===lockedBranch:true).map(b=><button key={b.id} onClick={()=>setSelBranch(b.nameEn)} style={{background:selBranch===b.nameEn?C.blue:C.surface,color:selBranch===b.nameEn?"#fff":C.muted,border:"1px solid "+(selBranch===b.nameEn?C.blue:C.border),borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{b.nameEn}</button>)}
        </div>}

        {/* Tech bar chart */}
        {filteredTech.length>0&&<div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"14px 16px",marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:14,color:C.accent,marginBottom:12}}>📊 {t("Technician Ranking","تصنيف الفنيين")}</div>
          <BarChart data={filteredTech} valueKey="overall" labelKey="name"/>
        </div>}

        {filteredTech.length===0?<div style={{textAlign:"center",padding:"60px 0",color:C.muted}}><div style={{fontSize:48,marginBottom:12}}>👷</div>{t("No technician data.","لا توجد بيانات فنيين.")}</div>
          :filteredTech.map((tech,i)=><TechCard key={tech.name} tech={tech} rank={i}/>)}
      </div>}

      {/* TRENDS TAB */}
      {tab==="trends"&&<div>
        {monthlyData.length===0?<div style={{textAlign:"center",padding:"60px 0",color:C.muted}}><div style={{fontSize:48,marginBottom:12}}>📈</div>{t("Not enough data for trends.","لا توجد بيانات كافية للاتجاهات.")}</div>:(
          <div>
            {/* Monthly avg score chart */}
            <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"14px 16px",marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:14,color:C.accent,marginBottom:4}}>📈 {t("Monthly Average Score","متوسط التقييم الشهري")}</div>
              <div style={{color:C.muted,fontSize:11,marginBottom:12}}>{t("Last 6 months","آخر 6 أشهر")}</div>
              <BarChart data={monthlyData} valueKey="avg" labelKey="month" maxVal={5}/>
            </div>

            {/* Monthly surveys count */}
            <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"14px 16px",marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:14,color:C.accent,marginBottom:4}}>📋 {t("Monthly Survey Count","عدد الفحوصات الشهري")}</div>
              <BarChart data={monthlyData} valueKey="surveys" labelKey="month" maxVal={Math.max(...monthlyData.map(m=>m.surveys))+2}/>
            </div>

            {/* Trend table */}
            <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"14px 16px",marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:14,color:C.accent,marginBottom:12}}>🗓 {t("Monthly Breakdown","التفصيل الشهري")}</div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr>
                    {[t("Month","الشهر"),t("Surveys","فحوصات"),t("Avg Score","متوسط التقييم"),t("Status","الحالة")].map(h=><th key={h} style={{padding:"7px 10px",textAlign:"left",color:C.accent,fontWeight:700,fontSize:11,borderBottom:"1px solid "+C.border,background:"rgba(230,146,10,0.08)"}}>{h}</th>)}
                  </tr></thead>
                  <tbody>{monthlyData.map((m,i)=>{
                    const prev=monthlyData[i-1];
                    const trend=prev?parseFloat(m.avg)-parseFloat(prev.avg):0;
                    return<tr key={m.month}>
                      <td style={{padding:"7px 10px",fontSize:12,color:C.text,borderBottom:"1px solid rgba(42,58,77,0.5)",fontWeight:600}}>{m.month}</td>
                      <td style={{padding:"7px 10px",fontSize:12,color:C.muted,borderBottom:"1px solid rgba(42,58,77,0.5)"}}>{m.surveys}</td>
                      <td style={{padding:"7px 10px",fontSize:13,fontWeight:700,color:sc(parseFloat(m.avg)),borderBottom:"1px solid rgba(42,58,77,0.5)"}}>{m.avg}</td>
                      <td style={{padding:"7px 10px",fontSize:12,borderBottom:"1px solid rgba(42,58,77,0.5)"}}>{prev?<span style={{color:trend>=0?C.green:C.red,fontWeight:700}}>{trend>=0?"▲":"▼"} {Math.abs(trend).toFixed(2)}</span>:<span style={{color:C.muted}}>—</span>}</td>
                    </tr>;
                  })}</tbody>
                </table>
              </div>
            </div>

            {/* Branch trend comparison */}
            {branches.length>0&&<div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"14px 16px",marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:14,color:C.accent,marginBottom:12}}>🏢 {t("Branch Performance Over Time","أداء الفروع عبر الزمن")}</div>
              {branches.map(b=>{
                const bSubs=subs.filter(s=>s.branch===b.nameEn);
                if(bSubs.length===0)return null;
                const avg_=arr=>arr.length?arr.reduce((a,x)=>a+x,0)/arr.length:0;
                const overall=avg_(bSubs.map(s=>(s.scores.physical+s.scores.engine+s.scores.tech+s.scores.csat)/4));
                return<div key={b.nameEn} style={{marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:13,fontWeight:600,color:C.text}}>{b.nameEn}{b.nameAr?" / "+b.nameAr:""}</span>
                    <span style={{fontSize:13,fontWeight:700,color:sc(overall)}}>{overall>0?overall.toFixed(2):"-"} <span style={{color:C.muted,fontSize:11}}>({bSubs.length} {t("surveys","فحص")})</span></span>
                  </div>
                  <div style={{height:10,background:C.border,borderRadius:5}}>
                    <div style={{height:"100%",width:((overall/5)*100)+"%",background:sc(overall),borderRadius:5,transition:"width 0.5s"}}/>
                  </div>
                </div>;
              })}
            </div>}
          </div>
        )}
      </div>}
    </div>
  </Bg>;
}

    const notifQuery=isSupervisor

    const n=dashSubs.length,scoreableDash=dashSubs.filter(isScoreable),ca=scoreableDash.length?{physical:scoreableDash.reduce((a,s)=>a+s.scores.physical,0)/scoreableDash.length,engine:scoreableDash.reduce((a,s)=>a+s.scores.engine,0)/scoreableDash.length,tech:scoreableDash.reduce((a,s)=>a+s.scores.tech,0)/scoreableDash.length,csat:scoreableDash.reduce((a,s)=>a+s.scores.csat,0)/scoreableDash.length}:{physical:0,engine:0,tech:0,csat:0};

  /* ── HISTORY ── */

      {(histBranch==="all"?filteredSubs:filteredSubs.filter(s=>s.branch===histBranch)).length>0&&(()=>{

                      alert(t("✅ Final approval given! Supervisor will be notified to close the case.","✅ تمت الموافقة النهائية! سيتم إشعار المشرف لإغلاق الحالة."));
                    }} style={{flex:2,background:"rgba(46,160,67,0.15)",border:"1px solid "+C.green,color:C.green,borderRadius:7,padding:"6px 14px",fontWeight:700,cursor:"pointer",fontSize:12}}>✅ {t("Final Approve","الموافقة النهائية")}</button>
                    <button onClick={async()=>{const r=window.prompt(t("Reason:","السبب:"));if(r!=null)await db.collection("surveys").doc(s.id).update({approvalStatus:"pending_admin",wcNumber:"",approvalNote:r});

                  </div>

                  <div style={{color:C.blue,fontSize:11,fontWeight:700}}>⏳ {t("Awaiting Branch Manager final approval","بانتظار موافقة مدير الفرع")}</div>

                  <div style={{color:C.muted,fontSize:10,marginTop:2}}>{t("Branch","الفرع")}: {s.branch}</div>
                </div>}

                {/* ── Non-warranty single approval (CM/PDI/CC) — manager of that branch ── */}
                {s.approvalStatus==="pending"&&(isAdmin||(isManager&&(!userBranch||s.branch===userBranch)))&&<div style={{display:"flex",gap:4}}>
                  <button onClick={async()=>{await db.collection("surveys").doc(s.id).update({approvalStatus:"approved"});}} style={{flex:2,background:"rgba(46,160,67,0.15)",border:"1px solid "+C.green,color:C.green,borderRadius:7,padding:"5px 14px",fontWeight:700,cursor:"pointer",fontSize:12}}>✅ {t("Approve","موافقة")}</button>
                  <button onClick={async()=>{const r=window.prompt(t("Reason for rejection:","سبب الرفض:"));if(r!=null){await db.collection("surveys").doc(s.id).update({approvalStatus:"rejected",approvalNote:r});await db.collection("notifications").add({type:"survey_rejected",surveyId:s.id,customerName:s.customerName||"",branch:s.branch||"",message:"❌ Your survey for "+s.customerName+" was rejected: "+r,forUser:s.submittedBy||"",read:false,createdAt:new Date().toISOString()});}}} style={{flex:1,background:"rgba(207,32,38,0.1)",border:"1px solid "+C.red,color:C.red,borderRadius:7,padding:"5px",fontWeight:700,cursor:"pointer",fontSize:12}}>❌</button>
                </div>}

              </div>}

              {isAdmin&&<button onClick={()=>delSub(s.id)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:18,padding:0,marginTop:4}}>🗑</button>}
            </div>
          </div>
        );})}
        </div>;
      })()}
    </div></Bg>;
  }

  /* ── FOLLOW-UPS ── */
  if(view==="followups"){
    const fuBase=fuBranch==="all"?filteredSubs:filteredSubs.filter(s=>s.branch===fuBranch);
    // Also include warranty claims pending approval for supervisor
    const warrantyPending=fuBase.filter(s=>s.serviceType==="Warranty Claim"&&(s.approvalStatus==="pending_admin"||s.approvalStatus==="pending_manager")&&!s.followUpRequired);
    const all=fuBase.filter(s=>s.followUpRequired),pending=all.filter(s=>!s.followUpDone),completed=all.filter(s=>s.followUpDone);
    const today=new Date().toISOString().slice(0,10);
    const overdue=pending.filter(s=>s.followUpDate&&s.followUpDate<today),upcoming=pending.filter(s=>!s.followUpDate||s.followUpDate>=today);
    const fuAllItems=[...overdue,...upcoming,...completed];
    const fuPaged=fuAllItems.slice(fuPage*PAGE,(fuPage+1)*PAGE);
    return<Bg dir={dir}><div style={{maxWidth:480,margin:"0 auto",padding:"0 16px 40px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 0 14px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}><Back onClick={()=>setView("menu")}/><div><h2 style={{margin:0,fontSize:18,fontWeight:800}}>{t("Follow-Up Tracker","متابعة المهام")}</h2><div style={{color:C.muted,fontSize:12}}>{pending.length} {t("pending","معلق")} · {completed.length} {t("done","منجز")}</div></div></div>
        <LangBtn lang={lang} onToggle={toggleLang}/><ThemeBtn theme={theme} onToggle={toggleTheme}/>
      </div>
      <SyncBanner online={online} syncing={syncing} t={t}/>
      {/* Statistics summary bar */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
        {[[t("Overdue","متأخرة"),overdue.length,C.red,"🚨"],[t("Upcoming","قادمة"),upcoming.length,C.accent,"📅"],[t("Completed","منجزة"),completed.length,C.green,"✅"]].map(([l,v,col,ic])=>(
          <div key={l} style={{background:C.card,border:"1px solid "+col,borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
            <div style={{fontSize:10,marginBottom:3}}>{ic}</div>
            <div style={{fontSize:24,fontWeight:900,color:col}}>{v}</div>
            <div style={{fontSize:10,color:C.muted,marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>
      {/* Branch filter */}
      {branches.length>0&&<div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:12,paddingBottom:4}}>
        {!(isSupervisor||isBranchManager)&&<button onClick={()=>setFuBranch("all")} style={{background:fuBranch==="all"?C.blue:C.surface,color:fuBranch==="all"?"#fff":C.muted,border:"1px solid "+(fuBranch==="all"?C.blue:C.border),borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>🌐 {t("All","الكل")}</button>}
        {branches.filter(b=>(isSupervisor||isBranchManager)?b.nameEn===userBranch:true).map(b=><button key={b.id} onClick={()=>setFuBranch(b.nameEn)} style={{background:fuBranch===b.nameEn?C.blue:C.surface,color:fuBranch===b.nameEn?"#fff":C.muted,border:"1px solid "+(fuBranch===b.nameEn?C.blue:C.border),borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{b.nameEn}</button>)}
      </div>}
      {all.length===0?<div style={{textAlign:"center",padding:"60px 0",color:C.muted}}><div style={{fontSize:48,marginBottom:12}}>✅</div>{t("No follow-ups required.","لا توجد متابعات.")}</div>:(
        <div>
          {/* Closure Approval Requests - only for manager/admin of that branch */}
          {(isAdmin||isManager)&&(()=>{
            const closureReqs=fuAllItems.filter(s=>s.closurePending&&!s.followUpDone&&(isAdmin||!userBranch||s.branch===userBranch));
            if(!closureReqs.length)return null;
            return<div style={{marginBottom:16}}>
              <div style={{color:"#9B59B6",fontWeight:800,fontSize:13,marginBottom:10}}>👔 {t("CLOSURE APPROVAL REQUESTS","طلبات موافقة الإغلاق")} ({closureReqs.length})</div>
              {closureReqs.map(s=><div key={s.id} style={{background:"rgba(155,89,182,0.08)",border:"2px solid rgba(155,89,182,0.4)",borderRadius:12,padding:"12px 14px",marginBottom:8}}>
                <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{s.customerName}</div>
                <div style={{color:C.muted,fontSize:12}}>👷 {s.technicianName} · 🏢 {s.branch}</div>
                <div style={{color:C.muted,fontSize:12}}>🗓 {fmtD(s.date)}</div>
                {s.followUpNotes&&<div style={{fontSize:12,color:C.muted,marginTop:4,fontStyle:"italic"}}>"{s.followUpNotes}"</div>}
                <div style={{color:"#9B59B6",fontSize:11,marginTop:4}}>
                  📩 {t("Requested by","طُلب من")} <strong>{s.closureRequestedBy}</strong>
                </div>
                <div style={{display:"flex",gap:8,marginTop:10}}>
                  <button onClick={async()=>{
                    await db.collection("surveys").doc(s.id).update({followUpDone:true,closurePending:false,closureType:"manager",closureRef:"manager_approved",closedAt:new Date().toISOString(),closedBy:user?.username||""});
                    // Notify supervisor
                    await db.collection("notifications").add({type:"fu_closure_approved",surveyId:s.id,customerName:s.customerName||"",branch:s.branch||"",message:"Follow-up closure approved for "+s.customerName,forUser:s.closureRequestedBy,read:false,createdAt:new Date().toISOString()});
                    alert(t("Approved! Supervisor notified ✅","تمت الموافقة! تم إشعار المشرف ✅"));
                  }} style={{flex:2,background:"rgba(46,160,67,0.15)",border:"1px solid "+C.green,color:C.green,borderRadius:8,padding:"8px",fontWeight:700,cursor:"pointer",fontSize:12}}>
                    ✅ {t("Approve Closure","الموافقة على الإغلاق")}
                  </button>
                  <button onClick={async()=>{
                    const r=window.prompt(t("Reason for rejection:","سبب الرفض:"));
                    if(r!=null){
                      await db.collection("surveys").doc(s.id).update({closurePending:false,closureType:"",closureRef:"",closureRejectedNote:r});
                      // Notify the supervisor who made the request — NOT the manager
                      await db.collection("notifications").add({
                        type:"fu_closure_rejected",
                        surveyId:s.id,
                        customerName:s.customerName||"",
                        branch:s.branch||"",
                        message:"❌ Your closure request for "+s.customerName+" was rejected: "+r,
                        rejectionReason:r,
                        forUser:s.closureRequestedBy,  // supervisor's username
                        read:false,
                        createdAt:new Date().toISOString()
                      });
                      alert(t("Rejected. Supervisor ("+s.closureRequestedBy+") has been notified.","تم الرفض. تم إشعار المشرف ("+s.closureRequestedBy+")."));
                    }
                  }} style={{flex:1,background:"rgba(207,32,38,0.1)",border:"1px solid "+C.red,color:C.red,borderRadius:8,padding:"8px",fontWeight:700,cursor:"pointer",fontSize:12}}>
                    ❌ {t("Reject","رفض")}
                  </button>
                </div>
              </div>)}
            </div>;
          })()}
          {warrantyPending.length>0&&<div style={{marginBottom:16}}>
            <div style={{color:"#9B59B6",fontWeight:800,fontSize:13,marginBottom:10}}>⏳ {t("WARRANTY PENDING APPROVAL","ضمانات بانتظار الموافقة")}</div>
            {warrantyPending.map(s=><div key={s.id} style={{background:"rgba(155,89,182,0.08)",border:"1px solid rgba(155,89,182,0.3)",borderRadius:12,padding:"12px 14px",marginBottom:8}}>
              <div style={{fontWeight:700,fontSize:14}}>{s.customerName}</div>
              <div style={{color:C.muted,fontSize:12}}>{s.technicianName} · {fmtD(s.date)}</div>
              {s.wcNumber&&<div style={{color:C.accent,fontSize:12,fontWeight:700}}>🔢 WC#: {s.wcNumber}</div>}
              <div style={{marginTop:6}}>
                {s.approvalStatus==="pending_admin"&&<span style={{background:"rgba(155,89,182,0.2)",color:"#9B59B6",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700}}>⏳ {t("Awaiting Admin WC# Approval","بانتظار موافقة الإدارة")}</span>}
                {s.approvalStatus==="pending_manager"&&<span style={{background:"rgba(26,111,168,0.2)",color:C.blue,borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700}}>⏳ {t("Awaiting Manager Final Approval","بانتظار الموافقة النهائية")}</span>}
              </div>
              {s.approvalStatus==="approved"&&(user?.role==="supervisor"||user?.role==="branch_manager")&&<button onClick={()=>markDone(s.id)} style={{marginTop:6,background:"linear-gradient(135deg,#2EA043,#1a6b2e)",color:"#fff",border:"none",borderRadius:8,padding:"6px 16px",fontWeight:700,cursor:"pointer",fontSize:12}}>✅ {t("Mark Done","إغلاق الحالة")}</button>}
              {s.approvalStatus==="approved"&&user?.role!=="supervisor"&&user?.role!=="branch_manager"&&<div style={{marginTop:6,color:C.green,fontSize:11,fontWeight:700}}>✅ {t("Awaiting supervisor to close","بانتظار المشرف")}</div>}
            </div>)}
          </div>}
          {overdue.length>0&&<div><div style={{color:C.red,fontWeight:800,fontSize:13,marginBottom:10}}>🚨 {t("OVERDUE","متأخرة")}</div>{fuPaged.filter(s=>overdue.includes(s)).map(s=><FUCard key={s.id} s={s} onDone={()=>markDone(s.id)} onView={()=>{setSel(s);setView("detail");}} overdue t={t} lang={lang} user={user} db={db} branches={branches}/>)}</div>}
          {upcoming.length>0&&<div><div style={{color:C.accent,fontWeight:800,fontSize:13,marginBottom:10,marginTop:overdue.length>0?16:0}}>📅 {t("UPCOMING","قادمة")}</div>{fuPaged.filter(s=>upcoming.includes(s)).map(s=><FUCard key={s.id} s={s} onDone={()=>markDone(s.id)} onView={()=>{setSel(s);setView("detail");}} t={t} lang={lang} user={user} db={db} branches={branches}/>)}</div>}
          {completed.length>0&&<div><div style={{color:C.green,fontWeight:800,fontSize:13,marginBottom:10,marginTop:16}}>✅ {t("COMPLETED","منجزة")}</div>{fuPaged.filter(s=>completed.includes(s)).map(s=><FUCard key={s.id} s={s} done onView={()=>{setSel(s);setView("detail");}} t={t} lang={lang} user={user} db={db} branches={branches}/>)}</div>}
          <Pager page={fuPage} setPage={setFuPage} total={fuAllItems.length} size={PAGE} t={t}/>
        </div>
      )}
    </div></Bg>;
  }

  /* ── CUSTOMER DB ── */
  if(view==="customers"){
    const filtered=filteredCusts.filter(c=>!custSearch||c.customerName.toLowerCase().includes(custSearch.toLowerCase())||(c.siteLocation||"").toLowerCase().includes(custSearch.toLowerCase()));
    return<Bg dir={dir}><div style={{maxWidth:480,margin:"0 auto",padding:"0 16px 40px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 0 14px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}><Back onClick={()=>setView("menu")}/><div><h2 style={{margin:0,fontSize:18,fontWeight:800}}>{t("Customer Database","قاعدة بيانات العملاء")}</h2><div style={{color:C.muted,fontSize:12}}>{filteredCusts.length} {t("customers","عميل")}{userBranch?" · 🏢 "+userBranch:""}</div></div></div>
        <LangBtn lang={lang} onToggle={toggleLang}/><ThemeBtn theme={theme} onToggle={toggleTheme}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:isAdmin?"1fr 1fr 1fr":"1fr",gap:10,marginBottom:14}}>
        {isAdmin&&<PBtn onClick={()=>fileRef.current.click()}>📥 {t("Import Excel","استيراد Excel")}</PBtn>}
        {isAdmin&&<button onClick={()=>{
          const rows=[["Customer Name","Site Location","Generator Model","Serial Number","Contact Person","Phone","Branch"],
            ...filteredCusts.map(c=>[c.customerName||"",c.siteLocation||"",c.generatorModel||"",c.serialNumber||"",c.contactPerson||"",c.phone||"",c.branch||""])];
          const ws=XLSX.utils.aoa_to_sheet(rows);
          const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Customers");
          XLSX.writeFile(wb,"GenSet_Customers_"+new Date().toISOString().slice(0,10)+".xlsx");
        }} style={{background:"linear-gradient(135deg,#2EA043,#1a6b2e)",color:"#fff",border:"none",borderRadius:11,padding:"12px",fontWeight:800,cursor:"pointer",fontSize:13}}>
          📤 {t("Export Excel","تصدير Excel")}
        </button>}
        <SBtn full onClick={()=>setCustAdding(!custAdding)}>➕ {t("Add Manually","إضافة يدوية")}</SBtn>
        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" onChange={async e=>{
          const file=e.target.files[0];if(!file)return;
          const rdr=new FileReader();
          rdr.onload=async ev=>{const data=new Uint8Array(ev.target.result);const wb=XLSX.read(data,{type:"array"});const ws=wb.Sheets[wb.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});const parsed=parseCust(rows);await importCustomers(parsed);alert(t("Imported ","تم استيراد ")+parsed.length+t(" customer(s)!"," عميل!"));};
          rdr.readAsArrayBuffer(file);e.target.value="";
        }} style={{display:"none"}}/>
      </div>
      {custAdding&&<Card title={t("Add New Customer","إضافة عميل جديد")} icon="➕">
        {[["customerName",t("Customer Name *","اسم العميل *"),t("Company / Person","شركة / شخص")],["siteLocation",t("Site Location","الموقع"),t("City / Address","المدينة / العنوان")],["generatorModel",t("Generator Model","موديل المولد"),"e.g. Cummins C275D5"],["serialNumber","Serial Number / الرقم التسلسلي","S/N"],["contactPerson",t("Contact Person","الشخص المسؤول"),""],["phone",t("Phone","الهاتف"),""]].map(([k,l,p])=>(
          <div key={k} style={{marginBottom:10}}><div style={{color:C.muted,fontSize:11,marginBottom:4,fontWeight:600,textTransform:"uppercase"}}>{l}</div><Inp value={custForm[k]} onChange={v=>setCustForm(f=>({...f,[k]:v}))} placeholder={p}/></div>
        ))}
        {/* Branch selector - managers see all branches, supervisors fixed to their branch */}
        <div style={{marginBottom:10}}>
          <div style={{color:C.muted,fontSize:11,marginBottom:4,fontWeight:600,textTransform:"uppercase"}}>{t("Branch","الفرع")} / الفرع</div>
          {isSupervisor
            ?<div style={{background:"rgba(26,111,168,0.1)",border:"1px solid rgba(26,111,168,0.3)",borderRadius:8,padding:"10px 12px",fontSize:14,color:C.text}}>🏢 {userBranch}</div>
            :<select value={custForm.branch||""} onChange={e=>setCustForm(f=>({...f,branch:e.target.value}))}
              style={{width:"100%",background:C.bg,border:"1px solid "+C.border,borderRadius:8,color:C.text,padding:"10px 12px",fontSize:14,outline:"none"}}>
              <option value="">{t("Select branch...","اختر الفرع...")}</option>
              {branches.map(b=><option key={b.id} value={b.nameEn}>{b.nameEn}{b.nameAr?" / "+b.nameAr:""}</option>)}
            </select>
          }
        </div>
        <div style={{display:"flex",gap:10}}>
          <SBtn flex onClick={()=>setCustAdding(false)}>{t("Cancel","إلغاء")}</SBtn>
          <button onClick={async()=>{
            if(!custForm.customerName.trim()){alert(t("Customer name required","اسم العميل مطلوب"));return;}
            const finalBranch=custForm.branch||userBranch;
            if(!finalBranch){alert(t("Please select a branch","يرجى اختيار الفرع"));return;}
            setCustSaving(true);
            try{
              await importCustomers([{...custForm,branch:finalBranch}]);
            }catch(e){alert(t("Error saving","خطأ في الحفظ"));}
            setCustForm({customerName:"",siteLocation:"",generatorModel:"",serialNumber:"",contactPerson:"",phone:"",branch:""});
            setCustAdding(false);
            setCustSaving(false);
          }} style={{flex:2,background:"linear-gradient(135deg,#F5A623,#C47B0A)",color:"#0D0800",border:"none",borderRadius:10,padding:"13px",fontWeight:800,cursor:"pointer"}}>{custSaving?t("Saving...","جاري الحفظ..."):t("Save ✓","حفظ ✓")}</button>
        </div>
      </Card>}
      <div style={{position:"relative",marginBottom:14}}>
        <input value={custSearch} onChange={e=>setCustSearch(e.target.value)} placeholder={t("Search customers...","البحث عن عميل...")} style={{width:"100%",background:C.bg,border:"1px solid "+C.border,borderRadius:10,color:C.text,padding:"11px 14px 11px 38px",fontSize:14,outline:"none",boxSizing:"border-box"}}/>
        <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:16}}>🔍</span>
      </div>

      {/* Admin edit customer panel */}
      {custEditId&&<div style={{background:C.surface,border:"2px solid "+C.accent,borderRadius:14,padding:"16px",marginBottom:14}}>
        <div style={{fontWeight:800,color:C.accent,fontSize:14,marginBottom:12}}>✏️ {t("Edit Customer","تعديل بيانات العميل")}</div>
        {[["customerName",t("Customer Name *","اسم العميل *"),t("Company / Person","شركة / شخص")],["siteLocation",t("Site Location","الموقع"),t("City / Address","المدينة / العنوان")],["generatorModel",t("Generator Model","موديل المولد"),"e.g. Cummins C275D5"],["serialNumber","Serial Number / الرقم التسلسلي","S/N"],["contactPerson",t("Contact Person","الشخص المسؤول"),""],["phone",t("Phone","الهاتف"),""]].map(([k,l,p])=>(
          <div key={k} style={{marginBottom:10}}>
            <div style={{color:C.muted,fontSize:11,marginBottom:4,fontWeight:600,textTransform:"uppercase"}}>{l}</div>
            <input value={custEditData[k]||""} onChange={e=>setCustEditData(d=>({...d,[k]:e.target.value}))}
              placeholder={p} style={{width:"100%",background:C.bg,border:"1px solid "+C.border,borderRadius:8,color:C.text,padding:"10px 12px",fontSize:14,outline:"none",boxSizing:"border-box"}}/>
          </div>
        ))}
        <div style={{marginBottom:14}}>
          <div style={{color:C.muted,fontSize:11,marginBottom:4,fontWeight:600,textTransform:"uppercase"}}>{t("Branch","الفرع")}</div>
          <select value={custEditData.branch||""} onChange={e=>setCustEditData(d=>({...d,branch:e.target.value}))}
            style={{width:"100%",background:C.bg,border:"1px solid "+C.border,borderRadius:8,color:C.text,padding:"10px 12px",fontSize:14,outline:"none"}}>
            <option value="">{t("Select branch...","اختر الفرع...")}</option>
            {branches.map(b=><option key={b.id} value={b.nameEn}>{b.nameEn}{b.nameAr?" / "+b.nameAr:""}</option>)}
          </select>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>{setCustEditId(null);setCustEditData({customerName:"",siteLocation:"",generatorModel:"",serialNumber:"",contactPerson:"",phone:"",branch:""}); }}
            style={{flex:1,background:C.surface,color:C.text,border:"1px solid "+C.border,borderRadius:9,padding:"12px",fontWeight:700,cursor:"pointer"}}>{t("Cancel","إلغاء")}</button>
          <button onClick={async()=>{
            if(!custEditData.customerName.trim()){alert(t("Customer name required","اسم العميل مطلوب"));return;}
            try{
              await db.collection("customers").doc(custEditId).update(custEditData);
              // Notify branch supervisor
              const targetBranch=custEditData.branch||userBranch;
              if(targetBranch){
                await sendBranchNotification(db,targetBranch,
                  t("Customer Data Updated","تم تحديث بيانات العميل"),
                  t("Admin updated customer information","قام المدير بتحديث بيانات العميل"),
                  custEditData.customerName,user.fullName);
              }
              alert(t("Customer updated ✅","تم تحديث العميل ✅"));
              setCustEditId(null);
              setCustEditData({customerName:"",siteLocation:"",generatorModel:"",serialNumber:"",contactPerson:"",phone:"",branch:""});
            }catch(e){alert(t("Error updating","خطأ في التحديث"));}
          }} style={{flex:2,background:"linear-gradient(135deg,#F5A623,#C47B0A)",color:"#0D0800",border:"none",borderRadius:9,padding:"12px",fontWeight:800,cursor:"pointer"}}>{t("Save Changes ✓","حفظ التغييرات ✓")}</button>
        </div>
      </div>}
      {filtered.length===0?<div style={{textAlign:"center",padding:"40px 0",color:C.muted}}><div style={{fontSize:40,marginBottom:10}}>👥</div>{filteredCusts.length===0?t("Import your customer list to get started.","استورد قائمة عملائك للبدء."):t("No results found.","لا توجد نتائج.")}</div>
