function parseCust(rows){
  if(!rows||rows.length<2)return[];
  const hdrs=(rows[0]||[]).map(h=>String(h||"").toLowerCase().trim());
  const get=(row,...names)=>{for(const n of names){const i=hdrs.findIndex(h=>h.includes(n));if(i>=0&&row[i]!=null)return String(row[i]).trim();}return"";};
  return rows.slice(1).filter(r=>r&&r.some(c=>c)).map((r)=>({
    customerName:get(r,"customer","client","name","company","account"),
    siteLocation:get(r,"site","location","address","city","area"),
    generatorModel:get(r,"model","generator","genset","unit"),
    serialNumber:get(r,"serial","s/n","sn"),
    contactPerson:get(r,"contact","person","rep"),
    phone:get(r,"phone","mobile","tel"),
    serviceType:get(r,"service","type"),
    branch:get(r,"branch","فرع","region"),
  })).filter(c=>c.customerName);
}

function parseUsers(rows){
  if(!rows||rows.length<2)return[];
  // Try header row first, fall back to positional (col A=username, B=password, C=fullName, D=role, E=branch)
  const hdrs=(rows[0]||[]).map(h=>String(h||"").toLowerCase().trim());
  const hasHdr=hdrs.some(h=>h.includes("user")||h.includes("pass")||h.includes("role"));
  const get=(row,...names)=>{for(const n of names){const i=hdrs.findIndex(h=>h.includes(n));if(i>=0&&row[i]!=null)return String(row[i]).trim();}return"";};
  const dataRows=hasHdr?rows.slice(1):rows;
  return dataRows.filter(r=>r&&r.some(c=>c)).map(r=>({
    username: hasHdr?get(r,"username","user","login"):String(r[0]||"").trim(),
    password: hasHdr?get(r,"password","pass","كلمة"):String(r[1]||"").trim(),
    fullName: hasHdr?get(r,"name","full","اسم"):String(r[2]||"").trim(),
    role:     hasHdr?get(r,"role","دور","type"):String(r[3]||"").trim(),
    branch:   hasHdr?get(r,"branch","فرع","region"):String(r[4]||"").trim(),
  })).filter(u=>u.username&&u.password&&u.username.length>0);
}

function parseBranches(rows){
  if(!rows||rows.length<2)return[];
  const hdrs=(rows[0]||[]).map(h=>String(h||"").toLowerCase().trim());
  const get=(row,...names)=>{for(const n of names){const i=hdrs.findIndex(h=>h.includes(n));if(i>=0&&row[i]!=null)return String(row[i]).trim();}return"";};
  return rows.slice(1).filter(r=>r&&r.some(c=>c)).map(r=>({
    code:get(r,"code","رمز","id"),
    nameEn:get(r,"english","en","name","اسم"),
    nameAr:get(r,"arabic","ar","عربي"),
  })).filter(b=>b.nameEn);
}

/* ══ LOGIN SCREEN ═════════════════════════════════════ */
function LoginScreen({onLogin,lang,onLangToggle}){
  const t=makeT(lang);
  const[username,setUsername]=useState("");
  const[password,setPassword]=useState("");
  const[error,setError]=useState("");
  const[loading,setLoading]=useState(false);
  const[showPw,setShowPw]=useState(false);

  async function doLogin(){
    if(!username.trim()||!password.trim()){setError(t("Please enter username and password","أدخل اسم المستخدم وكلمة المرور"));return;}
    setLoading(true);setError("");
    try{
      // Step 1: Find user profile by username in Firestore
      const snap=await db.collection("users").where("username","==",username.trim().toLowerCase()).get();
      if(snap.empty){
        await db.collection("failedLogins").add({username:username.trim(),reason:"username_not_found",time:new Date().toISOString(),device:navigator.userAgent.slice(0,80)}).catch(()=>{});
        setError(t("Username not found","اسم المستخدم غير موجود"));setLoading(false);return;
      }
      const doc=snap.docs[0];
      const userData=doc.data();
      const userDocId=doc.id;
      const email=userData.email||(username.trim().toLowerCase()+"@genset-app.com");

      // Step 2: Authenticate with Firebase Auth (secure - password never stored in plain text)
      try{
        await auth.signInWithEmailAndPassword(email, password);
      }catch(authErr){
        // Track failed attempt
        await db.collection("failedLogins").add({username:username.trim(),reason:"wrong_password",time:new Date().toISOString(),device:navigator.userAgent.slice(0,80)}).catch(()=>{});
        // Check if 3+ failures in 10 mins → notify admin
        const tenMinsAgo=new Date(Date.now()-10*60*1000).toISOString();
        const recentFails=await db.collection("failedLogins").where("username","==",username.trim()).get().catch(()=>({docs:[]}));
        const failCount=recentFails.docs.filter(d=>d.data().time>tenMinsAgo).length;
        if(failCount>=3){
          await db.collection("notifications").add({branch:"ALL",title:"⚠️ "+t("Multiple Failed Login Attempts","محاولات دخول فاشلة متعددة"),message:t("User","المستخدم")+" '"+username.trim()+"' "+t("failed login","فشل الدخول")+" "+failCount+" "+t("times in 10 mins","مرات في 10 دقائق"),custName:username.trim(),sentBy:"System",createdAt:new Date().toISOString(),read:false,type:"security"}).catch(()=>{});
        }
        if(authErr.code==="auth/wrong-password"||authErr.code==="auth/invalid-credential"||authErr.code==="auth/invalid-login-credentials")
          setError(t("Wrong password","كلمة المرور غير صحيحة"));
        else if(authErr.code==="auth/too-many-requests")
          setError(t("Too many attempts. Try again later.","محاولات كثيرة. حاول لاحقاً."));
        else if(authErr.code==="auth/user-not-found")
          setError(t("Account not set up. Contact admin.","الحساب غير مكتمل. تواصل مع المدير."));
        else
          setError(t("Wrong password","كلمة المرور غير صحيحة"));
        setLoading(false);return;
      }

      // Step 3: Check for existing active session (single device)
      const existingSession=await db.collection("sessions").doc(userDocId).get().catch(()=>null);
      if(existingSession&&existingSession.exists){
        const sess=existingSession.data();
        const lastSeen=sess.lastSeen?new Date(sess.lastSeen):new Date(0);
        const minsSince=(new Date()-lastSeen)/60000;
        if(minsSince<30&&sess.token!==localStorage.getItem("genset_token_"+userDocId)){
          await auth.signOut().catch(()=>{});
          setError(t("This account is already logged in on another device!","هذا الحساب مسجل دخوله على جهاز آخر!"));
          setLoading(false);return;
        }
      }

      // Step 4: Register session
      const sessionToken=Math.random().toString(36).slice(2)+Date.now();
      await db.collection("sessions").doc(userDocId).set({token:sessionToken,username:userData.username,lastSeen:new Date().toISOString(),device:navigator.userAgent.slice(0,50)}).catch(()=>{});
      localStorage.setItem("genset_token_"+userDocId,sessionToken);
      onLogin({...userData,id:userDocId,sessionToken,userDocId});

    }catch(e){
      console.error("Login error:",e.code,e.message);
      if(e.code&&e.code.includes("auth/"))
        setError(t("Wrong password","كلمة المرور غير صحيحة"));
      else if(e.message&&(e.message.includes("network")||e.message.includes("offline")))
        setError(t("No internet connection.","لا يوجد اتصال بالإنترنت."));
      else
        setError(t("Connection error. Check internet.","خطأ في الاتصال."));
    }
    setLoading(false);
  }

  return<Bg dir={lang==="ar"?"rtl":"ltr"}>
    <div style={{maxWidth:400,margin:"0 auto",padding:"0 20px",minHeight:"100vh",display:"flex",flexDirection:"column",justifyContent:"center"}}>
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:20}}><LangBtn lang={lang} onToggle={onLangToggle}/></div>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:80,height:80,borderRadius:"50%",background:"linear-gradient(135deg,#F5A623,#C47B0A)",boxShadow:"0 0 36px rgba(245,166,35,0.5)",fontSize:36,marginBottom:16}}>⚡</div>
        <h1 style={{margin:0,fontSize:24,fontWeight:900}}>GenSet Aftersales</h1>
        <p style={{margin:"8px 0 0",color:C.muted,fontSize:13}}>{t("Diesel Generator Inspection System","نظام فحص المولدات الديزل")}</p>
      </div>

      <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:16,padding:"24px 20px"}}>
        <h2 style={{margin:"0 0 20px",fontSize:17,fontWeight:800,textAlign:"center"}}>{t("Sign In","تسجيل الدخول")}</h2>

        <div style={{marginBottom:14}}>
          <div style={{color:C.muted,fontSize:11,marginBottom:5,fontWeight:600,textTransform:"uppercase"}}>{t("Username","اسم المستخدم")}</div>
          <Inp value={username} onChange={setUsername} placeholder={t("Enter username","أدخل اسم المستخدم")}/>
        </div>

        <div style={{marginBottom:6}}>
          <div style={{color:C.muted,fontSize:11,marginBottom:5,fontWeight:600,textTransform:"uppercase"}}>{t("Password","كلمة المرور")}</div>
          <div style={{position:"relative"}}>
            <input type={showPw?"text":"password"} value={password} onChange={e=>setPassword(e.target.value)}
              placeholder={t("Enter password","أدخل كلمة المرور")}
              onKeyDown={e=>e.key==="Enter"&&doLogin()}
              autoComplete="current-password"
              readOnly={false}
              style={{width:"100%",background:"rgba(10,16,24,0.85)",border:"1px solid "+C.border,borderRadius:8,color:C.text,padding:"10px 40px 10px 12px",fontSize:14,outline:"none",boxSizing:"border-box"}}/>
            <button onClick={()=>setShowPw(!showPw)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:16}}>{showPw?"🙈":"👁"}</button>
          </div>
        </div>

        {error&&<div style={{color:C.red,fontSize:12,marginBottom:12,padding:"8px 12px",background:"rgba(207,32,38,0.1)",borderRadius:8}}>{error}</div>}

        <PBtn full onClick={doLogin} disabled={loading}>{loading?t("Signing in...","جاري الدخول..."):"→ "+t("Sign In","تسجيل الدخول")}</PBtn>
      </div>

      <div style={{textAlign:"center",marginTop:20,color:C.muted,fontSize:11}}>
        {t("Contact your admin if you don't have an account","تواصل مع المدير إذا لم يكن لديك حساب")}
      </div>
    </div>
  </Bg>;
}

function AdminPanel({user,onLogout,onBack,lang,onLangToggle,subs=[],notifications=[]}){

  useEffect(()=>{
    const timeout=setTimeout(()=>setLoading(false),8000);
    const u1=db.collection("users").onSnapshot(s=>{setUsers(s.docs.map(d=>({...d.data(),id:d.id})));clearTimeout(timeout);setLoading(false);},()=>{clearTimeout(timeout);setLoading(false);});

  async function addUser(){
    if(!newUser.username||!newUser.password||!newUser.fullName)return alert(t("Fill all required fields","املأ جميع الحقول المطلوبة"));
    if(!newUser.email&&!newUser.username.includes("@")){
      // Auto-generate email from username
      newUser.email=newUser.username.toLowerCase().trim()+"@genset-app.com";
    }
    setSyncing(true);
    try{
      // Create Firebase Auth account
      const cred=await auth.createUserWithEmailAndPassword(
        newUser.email||newUser.username.toLowerCase().trim()+"@genset-app.com",
        newUser.password
      );
      // Store user profile in Firestore (without password)
      const {password,...safeUser}=newUser;
      await db.collection("users").doc(cred.user.uid).set({
        ...safeUser,
        username:newUser.username.toLowerCase().trim(),
        email:cred.user.email,
        uid:cred.user.uid,
        createdAt:new Date().toISOString()
      });
      setNewUser({username:"",password:"",fullName:"",role:"supervisor",branch:"",email:""});
      setAddingUser(false);
      alert(t("User created successfully!","تم إنشاء المستخدم بنجاح!"));
    }catch(e){
      if(e.code==="auth/email-already-in-use")alert(t("Username already exists!","اسم المستخدم موجود مسبقاً!"));
      else alert(t("Error: ","خطأ: ")+e.message);
    }
    setSyncing(false);
  }

  async function deleteUser(id,uid){
    if(!window.confirm(t("Delete this user?","حذف هذا المستخدم؟")))return;
    try{
      // Delete from Firestore
      await db.collection("users").doc(id).delete();
      // Note: Firebase Auth user deletion requires Admin SDK (server-side)
      // The user will still exist in Auth but cannot login without Firestore profile
      alert(t("User deleted. They can no longer login.","تم حذف المستخدم. لا يمكنه الدخول بعد الآن."));
    }catch(e){alert(t("Error deleting user","خطأ في حذف المستخدم"));}

  async function addBranch(){

    await db.collection("branches").add(newBranch);
    setNewBranch({code:"",nameEn:"",nameAr:""});
    setAddingBranch(false);setSyncing(false);
  }

  async function deleteBranch(id){
    if(!window.confirm(t("Delete this branch?","حذف هذا الفرع؟")))return;
    await db.collection("branches").doc(id).delete();
  }

  async function importUsersExcel(e){
    const file=e.target.files[0];if(!file)return;
    const rdr=new FileReader();
    rdr.onload=async ev=>{
      const data=new Uint8Array(ev.target.result);
      const wb=XLSX.read(data,{type:"array"});
      const wsName=wb.SheetNames.find(n=>n.toLowerCase().includes("user"))||wb.SheetNames[0];
      const ws=wb.Sheets[wsName];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      const parsed=parseUsers(rows);
      setSyncing(true);
      let created=0, skipped=0;
      for(const u of parsed){
        const uname=u.username.toLowerCase().trim();
        const email=uname+"@genset-app.com";
        try{
          // Check if username already exists in Firestore
          const existing=await db.collection("users").where("username","==",uname).get();
          if(!existing.empty){skipped++;continue;}
          // Try to create Firebase Auth account
          let uid=null;
          try{
            const cred=await auth.createUserWithEmailAndPassword(email,u.password);
            uid=cred.user.uid;
          }catch(authErr){
            if(authErr.code==="auth/email-already-in-use"){
              // Auth account exists but no Firestore profile
              // Sign in to get the UID
              try{
                const signIn=await auth.signInWithEmailAndPassword(email,u.password);
                uid=signIn.user.uid;
                // Sign back in as admin
                await auth.signInWithEmailAndPassword(
                  "admin@genset-app.com",
                  "admin123"
                );
              }catch(e2){
                // Try common passwords
                skipped++;continue;
              }
            }else{
              console.error("Auth error for",uname,authErr);
              skipped++;continue;
            }
          }
          if(!uid){skipped++;continue;}
          // Store profile WITHOUT password (secured by Firebase Auth)
          const {password:_p,...safeU2}=u;
          await db.collection("users").doc(uid).set({
            ...safeU2,username:uname,email,uid,
            createdAt:new Date().toISOString()
          });
          created++;
        }catch(err){
          console.error("Import error for",uname,err);
          skipped++;
        }
      }
      // Import branches
      const bsName=wb.SheetNames.find(n=>n.toLowerCase().includes("branch"));
      if(bsName){
        const bws=wb.Sheets[bsName];
        const brows=XLSX.utils.sheet_to_json(bws,{header:1,defval:""});
        const bparsed=parseBranches(brows);
        for(const b of bparsed)await db.collection("branches").add(b);

          const r=trows[i];
          const branch=String(r[0]||"").trim();
          const name=String(r[1]||"").trim();
          if(branch&&name){await db.collection("technicians").add({name,branch,createdAt:new Date().toISOString()});techCreated++;}
        }
      }
      setSyncing(false);
      alert(t("Created: ","تم إنشاء: ")+created+t(" users. Skipped: ","  مستخدم. تم تخطي: ")+skipped+(techCreated?" | Technicians: "+techCreated:""));
    };
    rdr.readAsArrayBuffer(file);e.target.value="";
  }

/* ══ FOLLOW-UP CARD ═══════════════════════════════════ */
function FUCard({s,onDone,onView,overdue,done,t}){
  const o=parseFloat(ovs(s));
  return<div style={{background:done?"rgba(46,160,67,0.07)":overdue?"rgba(207,32,38,0.08)":"rgba(245,166,35,0.07)",border:"1px solid "+(done?C.green:overdue?C.red:C.accent),borderRadius:12,padding:"14px 16px",marginBottom:10}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
      <div style={{flex:1,cursor:"pointer"}} onClick={onView}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:3}}>{s.customerName||t("Unknown","غير معروف")}</div>
        <div style={{color:C.muted,fontSize:12}}>👷 {s.technicianName||"-"} · 📍 {s.siteLocation||"-"}</div>
        <div style={{color:C.muted,fontSize:12,marginTop:2}}>🗓 {fmtD(s.date)} · ⚙️ {s.generatorModel||"-"}</div>
        {s.branch&&<div style={{fontSize:11,color:C.blue,marginTop:2}}>🏢 {s.branch}</div>}
        {s.followUpDate&&<div style={{fontSize:12,fontWeight:700,color:overdue?C.red:C.accent,marginTop:4}}>{overdue?t("⚠️ Overdue: ","⚠️ متأخر: "):t("📅 Due: ","📅 الموعد: ")}{fmtD(s.followUpDate)}</div>}
        {s.followUpNotes&&<div style={{fontSize:12,color:C.muted,marginTop:5,fontStyle:"italic",borderLeft:"2px solid "+C.border,paddingLeft:8}}>{s.followUpNotes}</div>}
      </div>
      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8,marginLeft:12}}>
        <div style={{color:sc(o),fontWeight:900,fontSize:22}}>{o.toFixed(1)}</div>
        {!done&&onDone&&<button onClick={onDone} style={{background:C.green,color:"#fff",border:"none",borderRadius:8,padding:"6px 10px",fontWeight:700,cursor:"pointer",fontSize:11}}>✓ {t("Done","تم")}</button>}
        {done&&<span style={{color:C.green,fontSize:11,fontWeight:700}}>{t("Done ✅","تم ✅")}</span>}
      </div>
    </div>
  </div>;
}

/* ══ EXCEL EXPORT ═════════════════════════════════════ */
function exportExcel(data,t){
  if(!data||data.length===0){alert(t("No data to export","لا توجد بيانات للتصدير"));return;}
  const rows=[
    [t("Customer","العميل"),t("Branch","الفرع"),t("Technician","الفني"),t("Date","التاريخ"),
     t("Physical","خارجي"),t("Engine","محرك"),t("Technician Score","الفني"),t("CSAT","العميل"),
     t("Overall","الإجمالي"),t("Service Type","نوع الخدمة"),t("Issues","المشكلات"),
     t("Follow-Up","متابعة"),t("Follow-Up Date","تاريخ المتابعة"),t("Notes","ملاحظات")],
    ...data.map(s=>[
      s.customerName||"",s.branch||"",s.technicianName||"",s.date||"",
      s.scores.physical>0?s.scores.physical.toFixed(2):"",
      s.scores.engine>0?s.scores.engine.toFixed(2):"",
      s.scores.tech>0?s.scores.tech.toFixed(2):"",
      s.scores.csat>0?s.scores.csat.toFixed(2):"",
      ((s.scores.physical+s.scores.engine+s.scores.tech+s.scores.csat)/4).toFixed(2),
      s.serviceType||"",s.issues||"",
      s.followUpRequired?t("Yes","نعم"):t("No","لا"),
      s.followUpDate||"",s.followUpNotes||""
    ])
  ];
  const ws=XLSX.utils.aoa_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,t("Surveys","الفحوصات"));
  XLSX.writeFile(wb,"GenSet_Report_"+new Date().toISOString().slice(0,10)+".xlsx");
}

/* ══ MANAGER REPORT ═══════════════════════════════════ */

        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>window.print()} style={{background:"linear-gradient(135deg,#F5A623,#C47B0A)",color:"#0D0800",border:"none",borderRadius:10,padding:"11px 18px",fontWeight:800,fontSize:14,cursor:"pointer"}}>📄 {t("PDF","PDF")}</button>
          <button onClick={()=>exportExcel(data,t)} style={{background:C.surface,color:C.green,border:"1px solid "+C.green,borderRadius:10,padding:"11px 18px",fontWeight:800,fontSize:14,cursor:"pointer"}}>📊 {t("Excel","Excel")}</button>

          <button key={v} onClick={()=>setRange(v)} style={{background:range===v?"linear-gradient(135deg,#F5A623,#C47B0A)":C.surface,color:range===v?"#0D0800":C.muted,border:"1px solid "+(range===v?"#F5A623":C.border),borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>{l}</button>

              <Td c={s.customerName||"-"} bold/><Td c={s.branch||"-"}/><Td c={s.technicianName||"-"}/><Td c={fmtD(s.date)}/><Td c={fmtD(s.followUpDate)} color={od?C.red:undefined}/>
              <td style={{padding:"6px 9px",borderBottom:"1px solid rgba(42,58,77,0.5)"}}>
                {s.followUpDone?<Bdg label={t("✓ Done","✓ تم")} color={C.green} bg="rgba(46,160,67,0.15)"/>:od?<Bdg label={t("⚠ Overdue","⚠ متأخر")} color={C.red} bg="rgba(207,32,38,0.15)"/>:<Bdg label={t("Pending","معلق")}/>}
              </td>
              <Td c={s.followUpNotes||"-"}/>
            </tr>;})}
            </tbody>
          </table>
        </div>
      )}

      {/* Low scoring */}
      {low.length>0&&<div>
        <div style={{background:"rgba(207,32,38,0.08)",borderLeft:"3px solid "+C.red,borderRadius:8,padding:"9px 14px",marginBottom:8}}><span style={{fontWeight:700,fontSize:14,color:C.red}}>⚠️ {t("Needs Attention","تحتاج اهتمام")}</span></div>
        <div style={{overflowX:"auto",marginBottom:20}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>{[t("Customer","العميل"),t("Branch","الفرع"),t("Date","التاريخ"),t("Score","التقييم"),t("Issues","المشكلات")].map(h=><th key={h} style={{padding:"7px 9px",textAlign:"left",color:C.red,fontWeight:700,fontSize:11,borderBottom:"1px solid "+C.border,background:"rgba(207,32,38,0.08)"}}>{h}</th>)}</tr></thead>
            <tbody>{low.map(s=><tr key={s.id}><Td c={s.customerName||"-"} bold/><Td c={s.branch||"-"}/><Td c={fmtD(s.date)}/><Td c={ovs(s)} color={C.red} bold/><Td c={s.issues||"-"}/></tr>)}</tbody>
          </table>
        </div>
      </div>}

      {/* CSAT */}
      <div style={{background:C.surface,borderLeft:"3px solid "+C.accent,borderRadius:8,padding:"9px 14px",marginBottom:8}}><span style={{fontWeight:700,fontSize:14,color:C.accent}}>⭐ {t("Customer Satisfaction","رضا العملاء")}</span></div>
      <div style={{marginBottom:20}}>{csatRows.map(({en,ar,avg:a})=>(
        <div key={en} style={{marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontSize:12,color:C.text}}>{en} / <span style={{color:"#9AAFBF"}}>{ar}</span></span>
            <span style={{fontSize:13,fontWeight:700,color:sc(a)}}>{a>0?a.toFixed(2):"-"} / 5.0</span>
          </div>
          <div style={{height:8,background:C.border,borderRadius:4}}><div style={{height:"100%",background:a>0?sc(a):C.border,borderRadius:4,width:a>0?((a/5)*100)+"%":"0%"}}/></div>
        </div>
      ))}</div>
      <div style={{textAlign:"center",color:C.muted,fontSize:11,paddingTop:12,borderTop:"1px solid "+C.border}}>GenSet Aftersales · {rptDate}</div>
    </div>
  </Bg>;
}



/* ══ STATS EXCEL EXPORT ══════════════════════════════ */
function exportStatsExcel(branchStats,techStats,monthlyData,t){
  const wb=XLSX.utils.book_new();

  // Sheet 1: Branch Statistics
  const bRows=[
    [t("Branch","الفرع"),t("Surveys","الفحوصات"),t("Overall","الإجمالي"),t("Physical","الخارجي"),t("Engine","المحرك"),t("Technician","الفني"),"CSAT",t("FU Pending","متابعة معلقة"),t("FU Done","منجزة"),t("Low Score","تقييم منخفض")],
    ...branchStats.map((b,i)=>[
      b.name,b.n,
      b.overall>0?b.overall.toFixed(2):"-",
      b.physical>0?b.physical.toFixed(2):"-",
      b.engine>0?b.engine.toFixed(2):"-",
      b.tech>0?b.tech.toFixed(2):"-",
      b.csat>0?b.csat.toFixed(2):"-",
      b.fu,b.fuDone,b.low
    ])
  ];
  const ws1=XLSX.utils.aoa_to_sheet(bRows);
  XLSX.utils.book_append_sheet(wb,ws1,t("Branches","الفروع"));

  // Sheet 2: Technician Statistics
  const tRows=[
    [t("Technician","الفني"),t("Branch","الفرع"),t("Jobs","المهام"),t("Overall","الإجمالي"),t("Physical","الخارجي"),t("Engine","المحرك"),t("Tech Score","الفني"),"CSAT",t("FU Pending","متابعة"),t("Low Score","تقييم منخفض")],
    ...techStats.map(tk=>[
      tk.name,tk.branch,tk.n,
      tk.overall>0?tk.overall.toFixed(2):"-",
      tk.physical>0?tk.physical.toFixed(2):"-",
      tk.engine>0?tk.engine.toFixed(2):"-",
      tk.tech>0?tk.tech.toFixed(2):"-",
      tk.csat>0?tk.csat.toFixed(2):"-",
      tk.fu,tk.low
    ])
  ];
  const ws2=XLSX.utils.aoa_to_sheet(tRows);
  XLSX.utils.book_append_sheet(wb,ws2,t("Technicians","الفنيون"));

  // Sheet 3: Monthly Trends
  const mRows=[
    [t("Month","الشهر"),t("Surveys","الفحوصات"),t("Avg Score","متوسط التقييم")],
    ...monthlyData.map(m=>[m.month,m.surveys,m.avg])
  ];
  const ws3=XLSX.utils.aoa_to_sheet(mRows);
  XLSX.utils.book_append_sheet(wb,ws3,t("Trends","الاتجاهات"));

  XLSX.writeFile(wb,"GenSet_Statistics_"+new Date().toISOString().slice(0,10)+".xlsx");
}

/* ══ STATISTICS REPORT ═══════════════════════════════ */
function StatisticsReport({subs,branches,user,onBack,lang,lockedBranch=null}){
  const t=makeT(lang);
  const[tab,setTab]=useState("branches");
  const[selBranch,setSelBranch]=useState(lockedBranch||"all");
  const[range,setRange]=useState("all");
  const[selMetric,setSelMetric]=useState("overall");

  // Filter data by range
  const rangeData=useMemo(()=>{
    if(range==="month")return subs.filter(s=>s.date&&s.date.slice(0,7)===new Date().toISOString().slice(0,7));
    if(range==="3m"){const d=new Date();d.setMonth(d.getMonth()-3);return subs.filter(s=>s.date>=d.toISOString().slice(0,10));}
    return subs;
  },[subs,range]);

  // Branch stats
  const branchStats=useMemo(()=>{
    const bNames=branches.length>0?branches.map(b=>b.nameEn):[...new Set(subs.map(s=>s.branch).filter(Boolean))];
    return bNames.map(name=>{
      const bSubs=rangeData.filter(s=>s.branch===name);
      const n=bSubs.length;
      if(n===0)return{name,n:0,overall:0,physical:0,engine:0,tech:0,csat:0,fu:0,fuDone:0,low:0};
      const avg_=arr=>arr.reduce((a,b)=>a+b,0)/arr.length;
      return{
        name,n,
        overall:avg_(bSubs.map(s=>parseFloat(((s.scores.physical+s.scores.engine+s.scores.tech+s.scores.csat)/4).toFixed(2)))),
        physical:avg_(bSubs.map(s=>s.scores.physical)),
        engine:avg_(bSubs.map(s=>s.scores.engine)),
        tech:avg_(bSubs.map(s=>s.scores.tech)),
        csat:avg_(bSubs.map(s=>s.scores.csat)),
        fu:bSubs.filter(s=>s.followUpRequired&&!s.followUpDone).length,
        fuDone:bSubs.filter(s=>s.followUpRequired&&s.followUpDone).length,
        low:bSubs.filter(s=>parseFloat(((s.scores.physical+s.scores.engine+s.scores.tech+s.scores.csat)/4).toFixed(2))<3).length,
      };
    }).filter(b=>b.n>0||branches.length>0).sort((a,b)=>b.overall-a.overall);
  },[rangeData,branches]);

  // Technician stats
  const techStats=useMemo(()=>{
    const techMap={};
    rangeData.forEach(s=>{
      if(!s.technicianName)return;
      const key=s.technicianName;
      if(!techMap[key])techMap[key]={name:key,branch:s.branch||"",jobs:[],};
      techMap[key].jobs.push(s);
    });
    return Object.values(techMap).map(t=>{
      const jobs=t.jobs;
      const n=jobs.length;
      const avg_=arr=>arr.reduce((a,b)=>a+b,0)/arr.length;
      const ovArr=jobs.map(s=>parseFloat(((s.scores.physical+s.scores.engine+s.scores.tech+s.scores.csat)/4).toFixed(2)));
      return{
        name:t.name,branch:t.branch,n,
        overall:avg_(ovArr),
        physical:avg_(jobs.map(s=>s.scores.physical)),
        engine:avg_(jobs.map(s=>s.scores.engine)),
        tech:avg_(jobs.map(s=>s.scores.tech)),
        csat:avg_(jobs.map(s=>s.scores.csat)),
        fu:jobs.filter(s=>s.followUpRequired&&!s.followUpDone).length,
        low:jobs.filter(s=>parseFloat(((s.scores.physical+s.scores.engine+s.scores.tech+s.scores.csat)/4).toFixed(2))<3).length,
      };
    }).sort((a,b)=>b.overall-a.overall);
  },[rangeData]);

  // Monthly trend data
  const monthlyData=useMemo(()=>{
    const months={};
    subs.forEach(s=>{
      if(!s.date)return;
      const m=s.date.slice(0,7);
      if(!months[m])months[m]={month:m,surveys:0,total:0};
      months[m].surveys++;
      months[m].total+=parseFloat(((s.scores.physical+s.scores.engine+s.scores.tech+s.scores.csat)/4).toFixed(2));
    });
    return Object.values(months).sort((a,b)=>a.month.localeCompare(b.month)).slice(-6).map(m=>({
      ...m,avg:m.surveys>0?(m.total/m.surveys).toFixed(2):0
    }));
  },[subs]);

  // Filtered tech for branch
  const filteredTech=(lockedBranch&&selBranch==="all")?techStats.filter(t=>t.branch===lockedBranch):(selBranch==="all"?techStats:techStats.filter(t=>t.branch===selBranch));

  // SVG Bar Chart
  function BarChart({data,valueKey,labelKey,height=160,maxVal=5}){
    if(!data||data.length===0)return<div style={{color:C.muted,fontSize:12,textAlign:"center",padding:"20px"}}>{t("No data","لا توجد بيانات")}</div>;
    const PALETTE=["#F5A623","#1A6FA8","#2EA043","#9B59B6","#E74C3C","#1ABC9C","#E67E22","#3498DB","#E91E63","#00BCD4"];
    const barW=Math.min(44,Math.floor(280/data.length));
    const gap=6;
    const svgW=data.length*(barW+gap)+20;
    return<div style={{overflowX:"auto"}}>
      <svg width={Math.max(svgW,300)} height={height+50} style={{display:"block"}}>
        {data.map((d,i)=>{
          const val=d[valueKey]||0;
          const barH=val>0?(val/maxVal)*(height-20):2;
          const x=10+i*(barW+gap);
          const y=height-barH;
          const col=PALETTE[i%PALETTE.length];
          return<g key={i}>
            <rect x={x} y={y} width={barW} height={barH} rx={4} fill={col} opacity={0.9}/>
            <text x={x+barW/2} y={y-4} textAnchor="middle" fill={col} fontSize={11} fontWeight={700}>{val>0?parseFloat(val).toFixed(1):""}</text>
            <text x={x+barW/2} y={height+16} textAnchor="middle" fill={C.muted} fontSize={9} fontFamily="Arial">{String(d[labelKey]||"").slice(0,6)}</text>
          </g>;
        })}
        <line x1={10} y1={height} x2={svgW-10} y2={height} stroke={C.border} strokeWidth={1}/>
      </svg>
    </div>;
  }

  // Score ring mini
  function MiniRing({score,label,sz=60}){
    const r=sz/2-6,ci=2*Math.PI*r,da=(score/5)*ci,col=sc(score);
    return<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
      <svg width={sz} height={sz}>
        <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={C.border} strokeWidth={5}/>
        <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={col} strokeWidth={5} strokeDasharray={da+" "+(ci-da)} strokeLinecap="round" transform={"rotate(-90 "+sz/2+" "+sz/2+")"}/>
        <text x={sz/2} y={sz/2+4} textAnchor="middle" fill={col} fontSize={12} fontWeight={700}>{score>0?score.toFixed(1):"-"}</text>
      </svg>
      <span style={{color:C.muted,fontSize:9,textAlign:"center",maxWidth:60}}>{label}</span>
    </div>;
  }

  // Branch Scorecard
  function BranchCard({b,rank}){
    const rankColor=rank===0?"#FFD700":rank===1?"#C0C0C0":rank===2?"#CD7F32":C.muted;
    return<div style={{background:C.card,border:"1px solid "+(b.overall>=4?C.green:b.overall>=3?C.yellow:b.overall>0?C.red:C.border),borderRadius:14,marginBottom:14,overflow:"hidden"}}>
      <div style={{padding:"12px 16px",background:C.surface,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:"50%",background:rankColor,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:14,color:"#0D0800"}}>#{rank+1}</div>
          <div>
            <div style={{fontWeight:800,fontSize:16,color:C.text}}>{b.name}</div>
            <div style={{color:C.muted,fontSize:11}}>{b.n} {t("surveys","فحص")}</div>
          </div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:28,fontWeight:900,color:sc(b.overall)}}>{b.overall>0?b.overall.toFixed(2):"-"}</div>
          <div style={{fontSize:10,color:C.muted}}>{t("Overall / 5.0","الإجمالي / 5.0")}</div>
        </div>
      </div>
      <div style={{padding:"12px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-around",marginBottom:12}}>
          <MiniRing score={b.physical} label={t("Physical","خارجي")}/>
          <MiniRing score={b.engine} label={t("Engine","محرك")}/>
          <MiniRing score={b.tech} label={t("Tech","الفني")}/>
          <MiniRing score={b.csat} label={t("CSAT","العميل")}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[[t("FU Pending","متابعة معلقة"),b.fu,C.accent],[t("FU Done","منجزة"),b.fuDone,C.green],[t("Low Score","تقييم منخفض"),b.low,C.red]].map(([l,v,col])=>(
            <div key={l} style={{background:C.surface,borderRadius:8,padding:"8px",textAlign:"center"}}>
              <div style={{fontSize:18,fontWeight:900,color:col}}>{v}</div>
              <div style={{fontSize:10,color:C.muted,marginTop:2}}>{l}</div>
            </div>
          ))}
        </div>
      </div>
    </div>;
  }

  // Technician Card
  function TechCard({tech,rank}){
    return<div style={{background:C.card,border:"1px solid "+C.border,borderRadius:12,padding:"14px 16px",marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:30,height:30,borderRadius:"50%",background:rank===0?"linear-gradient(135deg,#FFD700,#FFA500)":rank===1?"linear-gradient(135deg,#C0C0C0,#808080)":rank===2?"linear-gradient(135deg,#CD7F32,#8B4513)":C.surface,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,color:rank<3?"#0D0800":C.muted,border:rank>=3?"1px solid "+C.border:"none"}}>#{rank+1}</div>
          <div>
            <div style={{fontWeight:700,fontSize:15}}>{tech.name}</div>
            <div style={{color:C.muted,fontSize:11}}>🏢 {tech.branch||t("No branch","بدون فرع")} · {tech.n} {t("jobs","مهمة")}</div>
          </div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:24,fontWeight:900,color:sc(tech.overall)}}>{tech.overall>0?tech.overall.toFixed(2):"-"}</div>
        </div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        {[["Phy",tech.physical],[t("Eng","محرك"),tech.engine],[t("Tech","فني"),tech.tech],["CSAT",tech.csat]].map(([l,v])=>(
          <div key={l} style={{flex:1,background:C.surface,borderRadius:6,padding:"5px 2px",textAlign:"center"}}>
            <div style={{fontSize:12,fontWeight:700,color:sc(v)}}>{v>0?v.toFixed(1):"-"}</div>
            <div style={{fontSize:9,color:C.muted}}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{height:6,background:C.border,borderRadius:3}}>
        <div style={{height:"100%",width:((tech.overall/5)*100)+"%",background:sc(tech.overall),borderRadius:3,transition:"width 0.5s"}}/>
      </div>
      {tech.low>0&&<div style={{marginTop:6,fontSize:11,color:C.red}}>⚠️ {tech.low} {t("low-score job(s)","مهمة بتقييم منخفض")}</div>}
    </div>;
  }

  const tabs=[
    ["branches",t("Branches","الفروع"),"🏢"],
    ["technicians",t("Technicians","الفنيون"),"👷"],
    ["trends",t("Trends","الاتجاهات"),"📈"],
  ];

  return<Bg dir={lang==="ar"?"rtl":"ltr"}>
    <div style={{maxWidth:540,margin:"0 auto",padding:"0 16px 40px"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 0 14px",flexWrap:"wrap",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <Back onClick={onBack}/>
          <div>
            <h2 style={{margin:0,fontSize:18,fontWeight:800}}>📈 {t("Statistics","الإحصائيات")}</h2>
            <div style={{color:C.muted,fontSize:12}}>{rangeData.length} {t("surveys","فحص")}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>window.print()} style={{background:"linear-gradient(135deg,#F5A623,#C47B0A)",color:"#0D0800",border:"none",borderRadius:9,padding:"8px 14px",fontWeight:800,fontSize:13,cursor:"pointer"}}>📄 PDF</button>
          <button onClick={()=>exportStatsExcel(branchStats,techStats,monthlyData,t)} style={{background:C.surface,color:C.green,border:"1px solid "+C.green,borderRadius:9,padding:"8px 14px",fontWeight:800,fontSize:13,cursor:"pointer"}}>📊 Excel</button>
        </div>
      </div>

      {/* Range filter */}
      <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
        {[["month",t("This Month","هذا الشهر")],["3m",t("Last 3 Months","آخر 3 أشهر")],["all",t("All Time","كل الوقت")]].map(([v,l])=>(
          <button key={v} onClick={()=>setRange(v)} style={{background:range===v?"linear-gradient(135deg,#F5A623,#C47B0A)":C.surface,color:range===v?"#0D0800":C.muted,border:"1px solid "+(range===v?"#F5A623":C.border),borderRadius:8,padding:"7px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>{l}</button>
        ))}
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:8,marginBottom:18}}>
        {tabs.map(([v,l,ic])=>(
          <button key={v} onClick={()=>setTab(v)} style={{flex:1,background:tab===v?"linear-gradient(135deg,#F5A623,#C47B0A)":C.surface,color:tab===v?"#0D0800":C.muted,border:"1px solid "+(tab===v?"#F5A623":C.border),borderRadius:10,padding:"10px 6px",fontSize:12,fontWeight:800,cursor:"pointer"}}>{ic} {l}</button>
        ))}
      </div>

      {/* BRANCHES TAB */}
      {tab==="branches"&&<div>
        {/* Branch selector */}
        {branches.length>0&&<div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:14,paddingBottom:4}}>
          {!lockedBranch&&<button onClick={()=>setSelBranch("all")} style={{background:selBranch==="all"?C.blue:C.surface,color:selBranch==="all"?"#fff":C.muted,border:"1px solid "+(selBranch==="all"?C.blue:C.border),borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>🌐 {t("All Branches","جميع الفروع")}</button>}
          {branches.filter(b=>lockedBranch?b.nameEn===lockedBranch:true).map(b=><button key={b.id} onClick={()=>setSelBranch(b.nameEn)} style={{background:selBranch===b.nameEn?C.blue:C.surface,color:selBranch===b.nameEn?"#fff":C.muted,border:"1px solid "+(selBranch===b.nameEn?C.blue:C.border),borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{b.nameEn}</button>)}
        </div>}
        {/* Chart section - changes based on selection */}
        {branchStats.length>0&&<div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"14px 16px",marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:14,color:C.accent,marginBottom:12}}>
            📊 {selBranch==="all"?t("Branch Comparison","مقارنة الفروع"):t("Branch Detail","تفاصيل الفرع")+": "+selBranch}
          </div>
          {selBranch==="all"
            /* ALL BRANCHES: show one bar per branch for selected metric */
            ?<BarChart data={branchStats} valueKey={selMetric} labelKey="name"/>
            /* SINGLE BRANCH: show 5 bars - one per metric */
            :(()=>{
              const b=branchStats.find(x=>x.name===selBranch);
              if(!b)return<div style={{color:C.muted,fontSize:12,padding:"20px",textAlign:"center"}}>{t("No data","لا توجد بيانات")}</div>;
              const metrics=[
                {name:t("Overall","إجمالي"),val:b.overall},
                {name:t("Physical","خارجي"),val:b.physical},
                {name:t("Engine","محرك"),val:b.engine},
                {name:t("Tech","فني"),val:b.tech},
                {name:"CSAT",val:b.csat},
              ];
              return<BarChart data={metrics} valueKey="val" labelKey="name"/>;
            })()
          }
          {/* Metric selector - only shown for All Branches view */}
          {selBranch==="all"&&<div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
            {[["overall",t("Overall","إجمالي")],["physical",t("Physical","خارجي")],["engine",t("Engine","محرك")],["tech",t("Tech","فني")],["csat","CSAT"]].map(([k,l])=>(
              <button key={k} onClick={()=>setSelMetric(k)} style={{background:selMetric===k?"linear-gradient(135deg,#F5A623,#C47B0A)":C.surface,color:selMetric===k?"#0D0800":C.muted,border:"1px solid "+(selMetric===k?"#F5A623":C.border),borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>{l}</button>
            ))}
          </div>}
        </div>}

        {/* Summary KPIs - filtered by selected branch */}
        {branchStats.length>0&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
          {selBranch==="all"?[
            [t("Best Branch","أفضل فرع"),[...branchStats].sort((a,b)=>b.overall-a.overall)[0]?.name||"-",C.green],
            [t("Most Surveys","أكثر فحصاً"),[...branchStats].sort((a,b)=>b.n-a.n)[0]?.name||"-",C.accent],
            [t("Most FU Pending","أكثر متابعات"),[...branchStats].sort((a,b)=>b.fu-a.fu)[0]?.name||"-",C.red],
          ].map(([l,v,col])=>(
            <div key={l} style={{background:C.card,border:"1px solid "+C.border,borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
              <div style={{fontSize:13,fontWeight:800,color:col,marginBottom:3}}>{v}</div>
              <div style={{fontSize:10,color:C.muted}}>{l}</div>
            </div>
          )):(()=>{
            const b=branchStats.find(x=>x.name===selBranch);
            if(!b)return null;
            return[[t("Surveys","الفحوصات"),b.n,C.accent],[t("FU Pending","متابعة معلقة"),b.fu,C.yellow],[t("Low Score","تقييم منخفض"),b.low,C.red]].map(([l,v,col])=>(
              <div key={l} style={{background:C.card,border:"1px solid "+C.border,borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
                <div style={{fontSize:20,fontWeight:900,color:col,marginBottom:3}}>{v}</div>
                <div style={{fontSize:10,color:C.muted}}>{l}</div>
              </div>
            ));
          })()}
        </div>}

        {/* Branch scorecards */}
        {branchStats.length===0?<div style={{textAlign:"center",padding:"60px 0",color:C.muted}}><div style={{fontSize:48,marginBottom:12}}>📊</div>{t("No data for this period.","لا توجد بيانات لهذه الفترة.")}</div>
          :(selBranch==="all"?branchStats:branchStats.filter(b=>b.name===selBranch)).sort((a,b)=>b.overall-a.overall).map((b,i)=><BranchCard key={b.name} b={b} rank={i}/>)}
      </div>}

      {/* TECHNICIANS TAB */}
      {tab==="technicians"&&<div>
        {/* Branch filter */}
        {branches.length>0&&<div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:14,paddingBottom:4}}>
          {!lockedBranch&&<button onClick={()=>setSelBranch("all")} style={{background:selBranch==="all"?C.blue:C.surface,color:selBranch==="all"?"#fff":C.muted,border:"1px solid "+(selBranch==="all"?C.blue:C.border),borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>🌐 {t("All","الكل")}</button>}
          {branches.filter(b=>lockedBranch?b.nameEn===lockedBranch:true).map(b=><button key={b.id} onClick={()=>setSelBranch(b.nameEn)} style={{background:selBranch===b.nameEn?C.blue:C.surface,color:selBranch===b.nameEn?"#fff":C.muted,border:"1px solid "+(selBranch===b.nameEn?C.blue:C.border),borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{b.nameEn}</button>)}
        </div>}

        {/* Tech bar chart */}
        {filteredTech.length>0&&<div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"14px 16px",marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:14,color:C.accent,marginBottom:12}}>📊 {t("Technician Ranking","تصنيف الفنيين")}</div>
          <BarChart data={filteredTech} valueKey="overall" labelKey="name"/>
        </div>}

        {filteredTech.length===0?<div style={{textAlign:"center",padding:"60px 0",color:C.muted}}><div style={{fontSize:48,marginBottom:12}}>👷</div>{t("No technician data.","لا توجد بيانات فنيين.")}</div>
          :filteredTech.map((tech,i)=><TechCard key={tech.name} tech={tech} rank={i}/>)}
      </div>}

      {/* TRENDS TAB */}
      {tab==="trends"&&<div>
        {monthlyData.length===0?<div style={{textAlign:"center",padding:"60px 0",color:C.muted}}><div style={{fontSize:48,marginBottom:12}}>📈</div>{t("Not enough data for trends.","لا توجد بيانات كافية للاتجاهات.")}</div>:(
          <div>
            {/* Monthly avg score chart */}
            <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"14px 16px",marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:14,color:C.accent,marginBottom:4}}>📈 {t("Monthly Average Score","متوسط التقييم الشهري")}</div>
              <div style={{color:C.muted,fontSize:11,marginBottom:12}}>{t("Last 6 months","آخر 6 أشهر")}</div>
              <BarChart data={monthlyData} valueKey="avg" labelKey="month" maxVal={5}/>
            </div>

            {/* Monthly surveys count */}
            <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"14px 16px",marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:14,color:C.accent,marginBottom:4}}>📋 {t("Monthly Survey Count","عدد الفحوصات الشهري")}</div>
              <BarChart data={monthlyData} valueKey="surveys" labelKey="month" maxVal={Math.max(...monthlyData.map(m=>m.surveys))+2}/>
            </div>

            {/* Trend table */}
            <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"14px 16px",marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:14,color:C.accent,marginBottom:12}}>🗓 {t("Monthly Breakdown","التفصيل الشهري")}</div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr>
                    {[t("Month","الشهر"),t("Surveys","فحوصات"),t("Avg Score","متوسط التقييم"),t("Status","الحالة")].map(h=><th key={h} style={{padding:"7px 10px",textAlign:"left",color:C.accent,fontWeight:700,fontSize:11,borderBottom:"1px solid "+C.border,background:"rgba(245,166,35,0.1)"}}>{h}</th>)}
                  </tr></thead>
                  <tbody>{monthlyData.map((m,i)=>{
                    const prev=monthlyData[i-1];
                    const trend=prev?parseFloat(m.avg)-parseFloat(prev.avg):0;
                    return<tr key={m.month}>
                      <td style={{padding:"7px 10px",fontSize:12,color:C.text,borderBottom:"1px solid rgba(42,58,77,0.5)",fontWeight:600}}>{m.month}</td>
                      <td style={{padding:"7px 10px",fontSize:12,color:C.muted,borderBottom:"1px solid rgba(42,58,77,0.5)"}}>{m.surveys}</td>
                      <td style={{padding:"7px 10px",fontSize:13,fontWeight:700,color:sc(parseFloat(m.avg)),borderBottom:"1px solid rgba(42,58,77,0.5)"}}>{m.avg}</td>
                      <td style={{padding:"7px 10px",fontSize:12,borderBottom:"1px solid rgba(42,58,77,0.5)"}}>{prev?<span style={{color:trend>=0?C.green:C.red,fontWeight:700}}>{trend>=0?"▲":"▼"} {Math.abs(trend).toFixed(2)}</span>:<span style={{color:C.muted}}>—</span>}</td>
                    </tr>;
                  })}</tbody>
                </table>
              </div>
            </div>

            {/* Branch trend comparison */}
            {branches.length>0&&<div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"14px 16px",marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:14,color:C.accent,marginBottom:12}}>🏢 {t("Branch Performance Over Time","أداء الفروع عبر الزمن")}</div>
              {branches.map(b=>{
                const bSubs=subs.filter(s=>s.branch===b.nameEn);
                if(bSubs.length===0)return null;
                const avg_=arr=>arr.length?arr.reduce((a,x)=>a+x,0)/arr.length:0;
                const overall=avg_(bSubs.map(s=>(s.scores.physical+s.scores.engine+s.scores.tech+s.scores.csat)/4));
                return<div key={b.nameEn} style={{marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:13,fontWeight:600,color:C.text}}>{b.nameEn}{b.nameAr?" / "+b.nameAr:""}</span>
                    <span style={{fontSize:13,fontWeight:700,color:sc(overall)}}>{overall>0?overall.toFixed(2):"-"} <span style={{color:C.muted,fontSize:11}}>({bSubs.length} {t("surveys","فحص")})</span></span>
                  </div>
                  <div style={{height:10,background:C.border,borderRadius:5}}>
                    <div style={{height:"100%",width:((overall/5)*100)+"%",background:sc(overall),borderRadius:5,transition:"width 0.5s"}}/>
                  </div>
                </div>;
              })}
            </div>}
          </div>
        )}
      </div>}
    </div>
  </Bg>;
}


/* ══ NOTIFICATION HELPER ═════════════════════════════ */
async function sendBranchNotification(db,branch,title,message,custName,adminName){
  try{
    await db.collection("notifications").add({
      branch,title,message,custName,
      sentBy:adminName||"Admin",
      createdAt:new Date().toISOString(),
      read:false,
    });
  }catch(e){console.error("Notification error:",e);}
}

/* ══ MAIN APP ═════════════════════════════════════════ */
function App(){
  const[lang,setLang]=useState(()=>ld("genset_lang","en")||"en");
  const[user,setUser]=useState(()=>ld("genset_session",null));
  const[view,setView]=useState("menu");
  const[survey,setSurvey]=useState(blank);
  const[subs,setSubs]=useState([]);
  const[custs,setCusts]=useState([]);
  const[branches,setBranches]=useState([]);
  const[step,setStep]=useState(0);
  const[done,setDone]=useState(false);
  const[sel,setSel]=useState(null);
  const[loading,setLoading]=useState(true);
  const[syncing,setSyncing]=useState(false);
  const[online,setOnline]=useState(navigator.onLine);
  const[cs,setCs]=useState("");
  const[showDrop,setShowDrop]=useState(false);
  const[techOptions,setTechOptions]=useState([]);
  useEffect(()=>{const u=db.collection("technicians").onSnapshot(snap=>{setTechOptions(snap.docs.map(d=>({...d.data(),id:d.id})));},()=>{});return()=>u();},[]);
  const[dashBranch,setDashBranch]=useState("all");
  const[histBranch,setHistBranch]=useState("all");
  const[fuBranch,setFuBranch]=useState("all");
  const[custSearch,setCustSearch]=useState("");
  const[custAdding,setCustAdding]=useState(false);
  const[custSaving,setCustSaving]=useState(false);
  const[custForm,setCustForm]=useState({customerName:"",siteLocation:"",generatorModel:"",serialNumber:"",contactPerson:"",phone:"",branch:""});
  const[custEditId,setCustEditId]=useState(null);
  const[custEditData,setCustEditData]=useState({customerName:"",siteLocation:"",generatorModel:"",serialNumber:"",contactPerson:"",phone:"",branch:""});
  const[notifications,setNotifications]=useState([]);
  const[showNotifs,setShowNotifs]=useState(false);
  const fileRef=useRef();

  const t=makeT(lang);
  const dir=lang==="ar"?"rtl":"ltr";
  const STEPS=lang==="ar"?STEPS_AR:STEPS_EN;

  // Role checks
  const isAdmin=user?.role==="admin";
  const isBranchManager=user?.role==="branch_manager";
  const isManager=user?.role==="manager"||isAdmin;
  const isSupervisor=user?.role==="supervisor";
  const userBranch=user?.branch||"";

  function toggleLang(){const nl=lang==="en"?"ar":"en";setLang(nl);sv("genset_lang",nl);}

  function doLogin(userData){
    setUser(userData);sv("genset_session",userData);
    // Seed default admin if first login
  }

  async function doLogout(){
  try{
    if(user&&user.userDocId){
      await db.collection("sessions").doc(user.userDocId).delete();
      localStorage.removeItem("genset_token_"+user.userDocId);
    }
    await auth.signOut();
  }catch(e){}
  setUser(null);localStorage.removeItem("genset_session");setView("menu");
}

  // Firebase listeners
  useEffect(()=>{
    if(!user)return;
    const timeout=setTimeout(()=>setLoading(false),8000);
    let q=db.collection("surveys").orderBy("submittedAt","desc");
    const u1=q.onSnapshot(snap=>{
      let data=snap.docs.map(d=>({...d.data(),id:d.id}));
      setSubs(data);clearTimeout(timeout);setLoading(false);
    },err=>{console.error(err);clearTimeout(timeout);setLoading(false);});
    const u2=db.collection("customers").onSnapshot(snap=>{setCusts(snap.docs.map(d=>({...d.data(),id:d.id})));});
    const u3=db.collection("branches").onSnapshot(snap=>{setBranches(snap.docs.map(d=>({...d.data(),id:d.id})));});
    // Notifications - supervisors see only their branch
    const notifQuery=isSupervisor
      ?db.collection("notifications").where("branch","==",userBranch).orderBy("createdAt","desc").limit(20)
      :db.collection("notifications").orderBy("createdAt","desc").limit(20);
    const u4=notifQuery.onSnapshot(snap=>{
      let notifs=snap.docs.map(d=>({...d.data(),id:d.id}));
      // Extra client-side guard: supervisors only see their branch or ALL
      if((isSupervisor||isBranchManager)&&userBranch){
        notifs=notifs.filter(n=>n.branch===userBranch||n.branch==="ALL");
      }
      setNotifications(notifs);
    },()=>{});
    const up=()=>setOnline(true),dn=()=>setOnline(false);
    window.addEventListener("online",up);window.addEventListener("offline",dn);
    // Session heartbeat every 5 minutes
    const heartbeat=setInterval(async()=>{
      if(user&&user.userDocId){
        try{await db.collection("sessions").doc(user.userDocId).update({lastSeen:new Date().toISOString()});}catch(e){}
      }
    },5*60*1000);
    // Also update on window close/leave
    const handleUnload=async()=>{
      if(user&&user.userDocId){
        try{await db.collection("sessions").doc(user.userDocId).delete();}catch(e){}
      }
    };
    window.addEventListener("beforeunload",handleUnload);
    return()=>{u1();u2();u3();u4();clearTimeout(timeout);clearInterval(heartbeat);window.removeEventListener("online",up);window.removeEventListener("offline",dn);window.removeEventListener("beforeunload",handleUnload);};
  },[user]);

  // Ensure admin profile always exists in Firestore
  useEffect(()=>{
    (async()=>{
      try{
        const email="admin@genset-app.com";
        const password="admin123";
        // Check if admin profile exists in Firestore
        const adminSnap=await db.collection("users").where("username","==","admin").get();
        if(adminSnap.empty){
          // Admin profile missing - recreate it
          try{
            // Try creating new Auth account
            const cred=await auth.createUserWithEmailAndPassword(email,password);
            await db.collection("users").doc(cred.user.uid).set({
              username:"admin",email,fullName:"System Admin",
              role:"admin",branch:"",uid:cred.user.uid,
              createdAt:new Date().toISOString()
            });
            console.log("Admin created fresh");
          }catch(e2){
            if(e2.code==="auth/email-already-in-use"){
              // Auth exists - sign in to get UID then create Firestore profile
              try{
                const signIn=await auth.signInWithEmailAndPassword(email,password);
                const uid=signIn.user.uid;
                await db.collection("users").doc(uid).set({
                  username:"admin",email,fullName:"System Admin",
                  role:"admin",branch:"",uid,
                  createdAt:new Date().toISOString()
                });
                console.log("Admin Firestore profile restored");
              }catch(e3){console.error("Admin restore failed:",e3);}
            }
          }
        }
      }catch(e){console.error("Seed error:",e);}
    })();
  },[]);

  // Filter data by branch for supervisors
  const filteredSubs=(isSupervisor||isBranchManager)?subs.filter(s=>s.branch===userBranch):subs;
  const filteredCusts=(isSupervisor||isBranchManager)?custs.filter(c=>c.branch===userBranch):custs;

  function sf(path,val){setSurvey(p=>{if(path.includes(".")){const[s,k]=path.split(".");return{...p,[s]:{...p[s],[k]:val}};}return{...p,[path]:val};});}

  function fillCust(c){setSurvey(p=>({...p,customerName:c.customerName||p.customerName,siteLocation:c.siteLocation||p.siteLocation,generatorModel:c.generatorModel||p.generatorModel,serialNumber:c.serialNumber||p.serialNumber,serviceType:c.serviceType||p.serviceType}));setCs(c.customerName);setShowDrop(false);}

  async function submitSurvey(){
    const finalBranch=userBranch||survey.branch;
    if(!finalBranch){alert(t("Please select a branch before submitting","يرجى اختيار الفرع قبل الإرسال"));return;}
    const ph=avg(survey.physical),en_=avg(survey.engine),te=avg(survey.tech),csat=avg(survey.csat);
    const entry={...survey,branch:finalBranch,submittedBy:user.username,submittedAt:new Date().toISOString(),scores:{physical:ph,engine:en_,tech:te,csat}};
    setSyncing(true);
    try{await db.collection("surveys").add(entry);}catch(e){alert(t("Error saving. Check connection.","خطأ في الحفظ."));}
    setSyncing(false);setDone(true);
  }

  function reset(){setSurvey(blank());setStep(0);setDone(false);setCs("");setShowDrop(false);setView("menu");}

  async function markDone(id){try{await db.collection("surveys").doc(id).update({followUpDone:true});}catch(e){}}
  async function delSub(id){if(!window.confirm(t("Delete this survey?","حذف هذا الفحص؟")))return;try{await db.collection("surveys").doc(id).delete();}catch(e){}}

  async function importCustomers(list){
    setSyncing(true);
    const existing=filteredCusts.map(c=>(c.customerName||"").toLowerCase().trim());
    const newOnes=list.filter(c=>!existing.includes((c.customerName||"").toLowerCase().trim()));
    try{for(const c of newOnes){await db.collection("customers").add({...c,branch:c.branch||userBranch});}}catch(e){}
    setSyncing(false);
  }

  async function deleteCustomer(id){try{await db.collection("customers").doc(id).delete();}catch(e){}}

  const ph=avg(survey.physical),en_=avg(survey.engine),te=avg(survey.tech),csat=avg(survey.csat);
  const ov=(ph+en_+te+csat)/4;
  const pendFU=filteredSubs.filter(s=>s.followUpRequired&&!s.followUpDone);
  const dropCusts=filteredCusts.filter(c=>!cs||c.customerName.toLowerCase().includes(cs.toLowerCase())).slice(0,6);

  // Not logged in
  if(!user)return<LoginScreen onLogin={doLogin} lang={lang} onLangToggle={toggleLang}/>;

  // Admin panel
  if(isAdmin&&view==="admin")return<AdminPanel user={user} onLogout={doLogout} onBack={()=>setView("menu")} lang={lang} onLangToggle={toggleLang} subs={subs} notifications={notifications}/>;

  // Manager report
  if(view==="manager"&&(isManager||isBranchManager))return<ManagerReport subs={filteredSubs} branches={branches} onBack={()=>setView("menu")} lang={lang} lockedBranch={isBranchManager?userBranch:null}/>;
  if(view==="statistics"&&(isManager||isBranchManager))return<StatisticsReport subs={filteredSubs} branches={branches} user={user} onBack={()=>setView("menu")} lang={lang} lockedBranch={isBranchManager?userBranch:null}/>;

  // Loading
  if(loading)return<Bg><div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",flexDirection:"column",gap:16}}><div style={{fontSize:44}}>⚡</div><div style={{color:C.muted,fontSize:14}}>{t("Connecting to cloud...","الاتصال بالسحابة...")}</div></div></Bg>;

  /* ── MENU ── */
  if(view==="menu"){
    const n=filteredSubs.length,aov=n?(filteredSubs.reduce((a,s)=>a+parseFloat(ovs(s)),0)/n).toFixed(1):"-";
    return<Bg dir={dir}>
      <div style={{maxWidth:480,margin:"0 auto",padding:"0 16px 40px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0 4px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <RoleBadge role={user.role}/>
            {userBranch&&<Bdg label={"🏢 "+userBranch} color={C.blue} bg="rgba(26,111,168,0.15)"/>}
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <LangBtn lang={lang} onToggle={toggleLang}/>
            {/* Notification Bell */}
            <div style={{position:"relative"}}>
              <button onClick={()=>setShowNotifs(!showNotifs)} style={{background:C.surface,border:"1px solid "+(notifications.filter(n=>!n.read).length>0?C.accent:C.border),borderRadius:20,padding:"6px 10px",cursor:"pointer",fontSize:15,color:C.text,position:"relative",display:"flex",alignItems:"center",gap:4}}>
                🔔
                {notifications.filter(n=>!n.read).length>0&&<span style={{background:C.red,color:"#fff",borderRadius:"50%",width:16,height:16,fontSize:10,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>{notifications.filter(n=>!n.read).length}</span>}
              </button>
              {showNotifs&&<div style={{position:"absolute",right:0,top:"110%",width:290,background:C.card,border:"1px solid "+C.border,borderRadius:12,boxShadow:"0 8px 32px rgba(0,0,0,0.6)",zIndex:300,maxHeight:300,overflowY:"auto"}}>
                <div style={{padding:"10px 14px",borderBottom:"1px solid "+C.border,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontWeight:700,fontSize:13,color:C.accent}}>🔔 {t("Notifications","الإشعارات")}</span>
                  <button onClick={async()=>{for(const n of notifications.filter(x=>!x.read)){try{await db.collection("notifications").doc(n.id).update({read:true});}catch(e){}}setShowNotifs(false);}} style={{background:"none",border:"none",color:C.muted,fontSize:11,cursor:"pointer"}}>{t("Mark all read","تحديد الكل كمقروء")}</button>
                </div>
                {notifications.length===0
                  ?<div style={{padding:"20px",textAlign:"center",color:C.muted,fontSize:13}}>{t("No notifications","لا توجد إشعارات")}</div>
                  :notifications.map(n=><div key={n.id} onClick={async()=>{try{await db.collection("notifications").doc(n.id).update({read:true});}catch(e){}}} style={{padding:"10px 14px",borderBottom:"1px solid "+C.border,background:n.read?"transparent":"rgba(245,166,35,0.06)",cursor:"pointer"}}>
                    <div style={{fontWeight:700,fontSize:13,color:n.read?C.muted:C.text,marginBottom:2}}>{n.title}</div>
                    <div style={{fontSize:12,color:C.muted}}>{n.message}</div>
                    <div style={{fontSize:10,color:C.muted,marginTop:3}}>🏢 {n.branch} · {n.custName} · {n.createdAt?new Date(n.createdAt).toLocaleDateString("en-GB"):""}</div>
                  </div>)
                }
              </div>}
            </div>

          </div>

  /* ── DASHBOARD ── */
  if(view==="dashboard"&&(isManager||isBranchManager)){

        </div>
      </Card>}

        <input value={custSearch} onChange={e=>setCustSearch(e.target.value)} placeholder={t("Search customers...","البحث عن عميل...")} style={{width:"100%",background:"rgba(10,16,24,0.85)",border:"1px solid "+C.border,borderRadius:10,color:C.text,padding:"11px 14px 11px 38px",fontSize:14,outline:"none",boxSizing:"border-box"}}/>
        <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:16}}>🔍</span>

    {step===4&&<Card title={t("Technician Performance","أداء الفني")} titleAr={lang==="en"?"أداء الفني":"Technician Performance"} icon="👷">
      {TEC.map(([k,en,ar])=><div key={k} style={{marginBottom:16}}>
        <div style={{marginBottom:6}}><span style={{color:C.muted,fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:0.4}}>{en}</span><span style={{color:"#9AAFBF",fontSize:11,marginLeft:6}}>/ {ar}</span></div>
        <Stars value={survey.tech[k]} onChange={v=>sf("tech."+k,v)} lang={lang}/>
      </div>)}
      <AvgBar v={te} t={t}/>
    </Card>}

    {step===5&&<Card title={t("Customer Satisfaction","رضا العميل")} titleAr={lang==="en"?"رضا العميل":"Customer Satisfaction"} icon="⭐">
      {CST.map(([k,en,ar])=><div key={k} style={{marginBottom:16}}>
        <div style={{marginBottom:6}}><span style={{color:C.muted,fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:0.4}}>{en}</span><span style={{color:"#9AAFBF",fontSize:11,marginLeft:6}}>/ {ar}</span></div>
        <Stars value={survey.csat[k]} onChange={v=>sf("csat."+k,v)} lang={lang}/>
      </div>)}
      <AvgBar v={csat} t={t}/>
      <div style={{marginTop:14}}>
        <div style={{color:C.muted,fontSize:11,marginBottom:5,fontWeight:600,textTransform:"uppercase"}}>{t("Customer Comments","تعليقات العميل")} / تعليقات العميل</div>
        <Txa value={survey.customerComments} onChange={v=>sf("customerComments",v)} placeholder={t("Feedback...","التعليقات...")}/>
      </div>
    </Card>}

    {step===6&&<div>
      <Card title={t("Score Summary","ملخص التقييم")} titleAr={lang==="en"?"ملخص التقييم":"Score Summary"} icon="📊">
        <div style={{display:"flex",justifyContent:"space-around",flexWrap:"wrap",gap:12,marginBottom:14}}>
          <Ring score={ov} label="Overall" labelAr="الإجمالي" sz={76}/>
          <Ring score={ph} label="Physical" labelAr="خارجي" sz={76}/>
          <Ring score={en_} label="Engine" labelAr="محرك" sz={76}/>
          <Ring score={te} label="Tech" labelAr="الفني" sz={76}/>
          <Ring score={csat} label="CSAT" labelAr="العميل" sz={76}/>
        </div>
        <div style={{color:C.muted,fontSize:13}}>{t("Checklist:","القائمة:")} <strong style={{color:C.text}}>{dc(survey.parts)}</strong> {t("completed","منجز")}</div>
      </Card>
      <Card title={t("Issues & Follow-Up","المشكلات والمتابعة")} titleAr={lang==="en"?"المشكلات والمتابعة":"Issues & Follow-Up"} icon="⚠️" accent={C.accent}>
        <div style={{color:C.muted,fontSize:11,marginBottom:5,fontWeight:600,textTransform:"uppercase"}}>{t("Issues Observed","المشكلات الملاحظة")} / المشكلات الملاحظة</div>
        <Txa value={survey.issues} onChange={v=>sf("issues",v)} placeholder={t("Issues found...","المشكلات الملاحظة...")}/>
        <div style={{marginTop:10}}><Tog checked={survey.followUpRequired} onChange={v=>sf("followUpRequired",v)} en={t("Follow-up visit required","مطلوب زيارة متابعة")} ar={lang==="en"?"مطلوب زيارة متابعة":"Follow-up visit required"}/></div>
        {survey.followUpRequired&&<div>
          <div style={{color:C.muted,fontSize:11,marginBottom:5,fontWeight:600,textTransform:"uppercase"}}>{t("Follow-up Date","تاريخ المتابعة")} / تاريخ المتابعة</div>
          <Inp type="date" value={survey.followUpDate} onChange={v=>sf("followUpDate",v)}/>
          <div style={{marginTop:10}}>
            <div style={{color:C.muted,fontSize:11,marginBottom:5,fontWeight:600,textTransform:"uppercase"}}>{t("Action Required","الإجراء المطلوب")} / الإجراء المطلوب</div>
            <Txa value={survey.followUpNotes} onChange={v=>sf("followUpNotes",v)} placeholder={t("What needs to be done...","ما الذي يجب القيام به...")}/>
          </div>
        </div>}
      </Card>
      <button onClick={submitSurvey} style={{width:"100%",background:"linear-gradient(135deg,#F5A623,#C47B0A)",color:"#0D0800",border:"none",borderRadius:13,padding:"20px",fontSize:17,fontWeight:900,cursor:"pointer",boxShadow:"0 4px 20px rgba(245,166,35,0.4)",marginTop:8}}>
        {syncing?t("Saving... 🔄","جاري الحفظ... 🔄"):("✅ "+t("Submit Inspection Survey","إرسال نتائج الفحص"))}
      </button>
    </div>}

    <div style={{display:"flex",gap:10,marginTop:16}}>
      {step>0&&<SBtn flex onClick={()=>setStep(step-1)}>&#8592; {t("Back","رجوع")}</SBtn>}
      {step<STEPS.length-1&&<button onClick={()=>setStep(step+1)} style={{flex:1,background:"linear-gradient(135deg,#F5A623,#C47B0A)",color:"#0D0800",border:"none",borderRadius:11,padding:"14px",fontSize:15,fontWeight:900,cursor:"pointer"}}>{t("Continue","متابعة")} &#8594;</button>}
    </div>
  </div></Bg>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
